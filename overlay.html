<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="icon" type="image/png" href="favicon.png?v=2">
<link rel="apple-touch-icon" href="favicon.png?v=2">
<title>ロゴ合成</title>
<style>
  :root {
    --bg: #101418;
    --bg2: #1a2027;
    --bg3: #232b34;
    --text: #e8edf2;
    --text2: #8b98a5;
    --accent: #4dabf7;
    --danger: #ff6b6b;
    --success: #51cf66;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { touch-action: manipulation; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; padding: 16px;
    padding-top: calc(16px + env(safe-area-inset-top));
    padding-bottom: calc(16px + env(safe-area-inset-bottom));
  }
  h1 { font-size: 1.2rem; margin-bottom: 12px; }
  button {
    background: var(--bg2); color: var(--text);
    border: 1px solid var(--text2); border-radius: 8px;
    padding: 10px 14px; font-size: .9rem; cursor: pointer;
  }
  button:active { opacity: .8; }
  /* 入力欄はfont-size 16px以上にする(iOSのフォーカス時自動ズーム防止) */
  input[type=text], select {
    background: var(--bg2); color: var(--text);
    border: 1px solid var(--text2); border-radius: 8px;
    padding: 10px 12px; font-size: 16px; flex: 1;
  }
  input[type=number] {
    background: var(--bg2); color: var(--text);
    border: 1px solid var(--text2); border-radius: 8px;
    padding: 10px 12px; font-size: 16px; width: 72px;
  }
  input[type=range] { width: 100%; accent-color: var(--accent); }

  /* ===== タブ ===== */
  .tabbar {
    position: sticky; top: 0; z-index: 10;
    display: flex; gap: 6px; background: var(--bg);
    padding-bottom: 10px; margin-bottom: 12px;
  }
  .tab-btn {
    flex: 1; text-align: center; border-radius: 10px;
  }
  .tab-btn.active { background: var(--accent); color: #06202f; border-color: var(--accent); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ===== メッセージ(トースト) ===== */
  .msg {
    border-radius: 8px; padding: 10px 12px; font-size: .85rem;
    margin-bottom: 12px; border-left: 4px solid var(--accent); background: var(--bg2);
  }
  .msg.success { border-left-color: var(--success); }
  .msg.error { border-left-color: var(--danger); }

  /* ===== 共通レイアウト ===== */
  .row { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
  .filebtn { position: relative; overflow: hidden; }
  .section-title { font-size: .85rem; color: var(--text2); margin: 16px 0 8px; }

  /* ===== プレビュー ===== */
  .preview-wrap {
    position: relative; background: var(--bg2); border-radius: 10px;
    overflow: hidden; margin-bottom: 12px; min-height: 160px;
    display: flex; align-items: center; justify-content: center;
  }
  #preview-canvas { width: 100%; display: block; touch-action: none; }
  .preview-empty { color: var(--text2); font-size: .85rem; padding: 40px 0; }

  /* ===== 素材チップ ===== */
  .chips { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 12px; }
  .chip {
    flex: 0 0 auto; display: flex; align-items: center; gap: 6px;
    background: var(--bg2); border: 1px solid var(--text2); border-radius: 20px;
    padding: 6px 10px; font-size: .8rem;
  }
  .chip.active { background: var(--accent); color: #06202f; border-color: var(--accent); font-weight: 600; }
  .chip.disabled { opacity: .45; }
  .chip button { padding: 4px 8px; font-size: .7rem; border-radius: 6px; }
  #pad-color {
    flex: 0 0 auto; width: 44px; height: 33px; padding: 2px;
    background: var(--bg2); border: 1px solid var(--text2); border-radius: 8px;
  }
  .color-input {
    flex: 0 0 auto; width: 44px; height: 40px; padding: 2px;
    background: var(--bg2); border: 1px solid var(--text2); border-radius: 8px;
  }
  .text-content {
    width: 100%; resize: vertical; font-family: inherit;
    background: var(--bg2); color: var(--text);
    border: 1px solid var(--text2); border-radius: 8px;
    padding: 10px 12px; font-size: 16px;
  }

  /* ===== 設定パネル ===== */
  .item-panel { background: var(--bg2); border-radius: 10px; padding: 14px; margin-bottom: 12px; }
  .item-panel-header { display: flex; justify-content: space-between; align-items: center; }
  .item-panel-title { font-size: .85rem; color: var(--text2); }
  .panel-toggle-btn { padding: 6px 12px; font-size: .8rem; }
  .panel-toggle-btn.active { border-color: var(--accent); background: var(--bg3); }
  #item-panel-body { margin-top: 12px; }
  .anchor-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px;
    max-width: 160px; margin: 0 auto 14px;
  }
  .anchor-btn { padding: 10px; font-size: 1rem; }
  .anchor-btn[data-anchor="tl"] { grid-area: 1 / 1; }
  .anchor-btn[data-anchor="tr"] { grid-area: 1 / 3; }
  .anchor-btn[data-anchor="c"]  { grid-area: 2 / 2; }
  .anchor-btn[data-anchor="bl"] { grid-area: 3 / 1; }
  .anchor-btn[data-anchor="br"] { grid-area: 3 / 3; }
  .anchor-btn.active { background: var(--accent); color: #06202f; border-color: var(--accent); }
  .slider-row { margin-bottom: 12px; }
  .slider-row .label-row { display: flex; justify-content: space-between; font-size: .8rem; color: var(--text2); margin-bottom: 4px; }
  .stepper-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-size: .85rem; }
  .stepper-row span.label { width: 64px; color: var(--text2); }
  .stepper-row button { padding: 6px 12px; }
  .stepper-row .val { width: 52px; text-align: center; }

  /* ===== 素材一覧 ===== */
  .asset-list { display: flex; flex-direction: column; gap: 8px; }
  .asset-card {
    display: flex; align-items: center; gap: 10px;
    background: var(--bg2); border-radius: 10px; padding: 8px;
  }
  .asset-card.missing { opacity: .5; }
  .asset-thumb {
    width: 56px; height: 56px; border-radius: 6px; overflow: hidden; flex: 0 0 auto;
    display: flex; align-items: center; justify-content: center;
    background-color: #2a2a2a;
    background-image:
      linear-gradient(45deg, #444 25%, transparent 25%), linear-gradient(-45deg, #444 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #444 75%), linear-gradient(-45deg, transparent 75%, #444 75%);
    background-size: 12px 12px;
    background-position: 0 0, 0 6px, 6px -6px, -6px 0px;
  }
  .asset-info { flex: 1; min-width: 0; }
  .asset-name { font-size: .9rem; }
  .asset-meta { font-size: .75rem; color: var(--text2); }

  /* ===== プリセット ===== */
  .preset-row {
    display: flex; align-items: center; gap: 8px;
    background: var(--bg2); border-radius: 10px; padding: 10px 12px; margin-bottom: 8px;
  }
  .preset-row.active { border: 1px solid var(--accent); }
  .preset-name { flex: 1; font-size: .9rem; }
  #applied-preset { font-size: .8rem; color: var(--text2); margin-bottom: 8px; min-height: 1em; }

  /* ===== 比率一覧(カテゴリ別カード) ===== */
  .ratio-row { background: var(--bg2); border-radius: 10px; padding: 8px; margin-bottom: 8px; }
  .ratio-row-line { display: flex; gap: 8px; margin-bottom: 6px; }
  .ratio-row-line:last-child { margin-bottom: 0; }

  /* ===== カテゴリ予測入力 ===== */
  .autocomplete-wrap { position: relative; flex: 1; }
  .autocomplete-wrap input[type=text] { width: 100%; }
  .autocomplete-list {
    position: absolute; left: 0; right: 0; top: calc(100% + 4px); z-index: 30;
    background: var(--bg3); border: 1px solid var(--text2); border-radius: 8px;
    max-height: 160px; overflow-y: auto; display: none;
  }
  .autocomplete-list.show { display: block; }
  .autocomplete-item { padding: 8px 12px; font-size: .85rem; }
  .autocomplete-item:active { background: var(--bg2); }

  /* ===== 一括合成結果 ===== */
  .bulk-row {
    display: flex; align-items: center; gap: 10px;
    background: var(--bg2); border-radius: 10px; padding: 8px; margin-bottom: 8px;
  }
  .bulk-thumb { width: 48px; height: 48px; object-fit: cover; border-radius: 6px; }
  .bulk-name { flex: 1; font-size: .8rem; word-break: break-all; }

  .footer { text-align: center; font-size: .7rem; color: var(--text2); margin-top: 24px; }
</style>
</head>
<body>

<h1>ロゴ合成</h1>

<div class="tabbar">
  <button class="tab-btn active" data-tab="edit">編集</button>
  <button class="tab-btn" data-tab="assets">素材</button>
  <button class="tab-btn" data-tab="presets">プリセット</button>
  <button class="tab-btn" data-tab="ratios">比率</button>
</div>

<div id="msg" class="msg" style="display:none"></div>

<!-- ===== 編集タブ ===== -->
<section id="tab-edit" class="tab-panel active">
  <div class="row">
    <label class="filebtn">
      <button type="button" onclick="document.getElementById('photo-input').click()">📷 写真を選ぶ</button>
      <input type="file" id="photo-input" accept="image/*" style="display:none">
    </label>
    <label class="filebtn">
      <button type="button" onclick="document.getElementById('bulk-input').click()">🗂 一括合成</button>
      <input type="file" id="bulk-input" accept="image/*" multiple style="display:none">
    </label>
  </div>

  <div id="category-chips" class="chips"></div>

  <div id="ratio-chips" class="chips"></div>

  <div id="fit-mode-row" class="chips" style="display:none">
    <div class="chip" id="fit-crop-chip"><span class="chip-name">✂ 切り抜き</span></div>
    <div class="chip" id="fit-pad-chip"><span class="chip-name">⬜ 余白</span></div>
    <input type="color" id="pad-color" style="display:none">
  </div>

  <div class="preview-wrap">
    <canvas id="preview-canvas" style="display:none"></canvas>
    <div id="preview-empty" class="preview-empty">写真を選んでください</div>
  </div>

  <div class="section-title">スクリム</div>
  <div id="scrim-pos-row" class="chips">
    <div class="chip" id="scrim-off-chip"><span class="chip-name">オフ</span></div>
    <div class="chip" id="scrim-bottom-chip"><span class="chip-name">下</span></div>
    <div class="chip" id="scrim-top-chip"><span class="chip-name">上</span></div>
  </div>
  <div class="slider-row" id="scrim-strength-row" style="display:none">
    <div class="label-row"><span>濃さ</span><span id="scrim-strength-value"></span></div>
    <input type="range" id="scrim-strength-slider" min="0" max="1" step="0.01">
  </div>
  <div class="slider-row" id="scrim-range-row" style="display:none">
    <div class="label-row"><span>範囲</span><span id="scrim-range-value"></span></div>
    <input type="range" id="scrim-range-slider" min="5" max="100" step="1">
  </div>

  <div class="row">
    <button type="button" id="add-text-btn">✏ テキスト追加</button>
  </div>

  <div id="chips" class="chips"></div>

  <div id="item-panel" class="item-panel" style="display:none">
    <div class="item-panel-header">
      <span id="item-panel-title" class="item-panel-title"></span>
      <div style="display:flex; gap:6px">
        <button type="button" id="handle-toggle-btn" class="panel-toggle-btn">✅</button>
        <button type="button" id="panel-toggle-btn" class="panel-toggle-btn">▲</button>
      </div>
    </div>
    <div id="item-panel-body">
      <div class="slider-row">
        <div class="label-row"><span>不透明度</span><span id="opacity-value"></span></div>
        <input type="range" id="opacity-slider" min="0" max="1" step="0.01">
      </div>
      <div class="stepper-row">
        <span class="label">影</span>
        <button type="button" id="shadow-toggle-btn" class="panel-toggle-btn">OFF</button>
        <input type="color" id="shadow-color" class="color-input" style="display:none">
      </div>
      <div id="shadow-controls" style="display:none">
        <div class="slider-row">
          <div class="label-row"><span>影の長さ</span><span id="shadow-dist-value"></span></div>
          <input type="range" id="shadow-dist-slider" min="0" max="15" step="0.5">
        </div>
        <div class="slider-row">
          <div class="label-row"><span>影のぼかし</span><span id="shadow-blur-value"></span></div>
          <input type="range" id="shadow-blur-slider" min="0" max="20" step="0.5">
        </div>
      </div>
      <div class="slider-row">
        <div class="label-row"><span>回転</span><span id="rotation-value"></span></div>
        <input type="range" id="rotation-slider" min="-180" max="180" step="1">
      </div>
      <div id="text-section" style="display:none">
        <div class="slider-row">
          <textarea id="text-content" class="text-content" rows="3" placeholder="テキストを入力（改行可）"></textarea>
        </div>
        <div class="row">
          <select id="text-font-select">
            <option value="gothic">ゴシック</option>
            <option value="mincho">明朝</option>
            <option value="maru">丸ゴシック</option>
          </select>
          <input type="color" id="text-color" class="color-input">
        </div>
        <div class="row">
          <button type="button" id="text-delete-btn">このテキストを削除</button>
        </div>
      </div>
      <div class="slider-row">
        <div class="label-row"><span>サイズ</span><span id="width-value"></span></div>
        <input type="range" id="width-slider" min="1" max="80" step="1">
      </div>
      <div class="stepper-row">
        <span class="label">横余白</span>
        <button type="button" onclick="stepMargin('x',-1)">−</button>
        <span class="val" id="marginx-value"></span>
        <button type="button" onclick="stepMargin('x',1)">＋</button>
      </div>
      <div class="stepper-row">
        <span class="label">縦余白</span>
        <button type="button" onclick="stepMargin('y',-1)">−</button>
        <span class="val" id="marginy-value"></span>
        <button type="button" onclick="stepMargin('y',1)">＋</button>
      </div>
      <div class="row">
        <button type="button" id="center-item-btn">⌖ 中央に戻す</button>
      </div>
      <div id="tint-section" style="display:none">
        <div class="section-title">色</div>
        <div class="chips">
          <div class="chip" id="tint-orig-chip"><span class="chip-name">元の色</span></div>
          <div class="chip" id="tint-white-chip"><span class="chip-name">白</span></div>
          <div class="chip" id="tint-black-chip"><span class="chip-name">黒</span></div>
          <input type="color" id="tint-custom" class="color-input">
        </div>
      </div>
      <div class="item-panel-header" style="margin-top:12px">
        <span class="item-panel-title">配置基準(アンカー)</span>
        <button type="button" id="anchor-toggle-btn" class="panel-toggle-btn">▼</button>
      </div>
      <div id="anchor-body" style="display:none">
        <div class="anchor-grid" style="margin-top:12px">
          <button class="anchor-btn" data-anchor="tl">↖</button>
          <button class="anchor-btn" data-anchor="tr">↗</button>
          <button class="anchor-btn" data-anchor="c">●</button>
          <button class="anchor-btn" data-anchor="bl">↙</button>
          <button class="anchor-btn" data-anchor="br">↘</button>
        </div>
      </div>
    </div>
  </div>

  <div class="row">
    <select id="format-select">
      <option value="jpeg">JPEG</option>
      <option value="png">PNG</option>
    </select>
    <button type="button" id="save-btn">💾 保存</button>
  </div>
  <div class="slider-row" id="quality-row">
    <div class="label-row"><span>JPEG品質</span><span id="quality-value"></span></div>
    <input type="range" id="quality-slider" min="0.5" max="1" step="0.01">
  </div>

  <div id="bulk-results"></div>
  <div id="share-bulk-wrap" style="display:none">
    <button type="button" onclick="shareBulk()">📤 まとめて共有</button>
  </div>
</section>

<!-- ===== 素材タブ ===== -->
<section id="tab-assets" class="tab-panel">
  <div class="row">
    <input type="text" id="asset-name" placeholder="素材名">
  </div>
  <div class="row">
    <label class="filebtn">
      <button type="button" onclick="document.getElementById('asset-file').click()">PNGを選択</button>
      <input type="file" id="asset-file" accept="image/png" style="display:none">
    </label>
    <button type="button" onclick="addAsset()">追加</button>
  </div>
  <div id="asset-list" class="asset-list"></div>
</section>

<!-- ===== プリセットタブ ===== -->
<section id="tab-presets" class="tab-panel">
  <div class="row">
    <input type="text" id="preset-name" placeholder="プリセット名">
    <button type="button" onclick="savePresetHandler()">現在のレイアウトを保存</button>
  </div>
  <div id="applied-preset"></div>
  <div id="preset-list"></div>
</section>

<!-- ===== 比率タブ ===== -->
<section id="tab-ratios" class="tab-panel">
  <div class="row">
    <input type="text" id="ratio-name" placeholder="比率名">
    <div class="autocomplete-wrap">
      <input type="text" id="ratio-category" placeholder="カテゴリ(カンマ区切りで複数可)" autocomplete="off">
    </div>
  </div>
  <div class="row">
    <input type="number" id="ratio-w" placeholder="幅" step="0.1">
    <input type="number" id="ratio-h" placeholder="高さ" step="0.1">
    <button type="button" onclick="addRatio()">追加</button>
  </div>
  <div id="ratio-list" class="asset-list"></div>
</section>

<div style="display:flex; gap:8px; margin-top:16px">
  <button onclick="exportData()">📤 バックアップ</button>
  <button onclick="document.getElementById('import-file').click()">📥 復元</button>
  <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">
</div>

<div class="footer">ver <span id="app-ver"></span></div>

<script>
// ===== 基本設定 =====
const APP_NAME = 'overlay';
const APP_KEY  = 'overlay_v1';
const VER_FILE = 'overlay-ver.txt';

// ===== AUTO UPDATE（kakeibo.html と同パターン、auto-version.yml が自動更新） =====
const APP_VERSION = 24;
(function checkUpdate() {
  fetch(VER_FILE + '?t=' + Date.now(), { cache: 'no-store' })
    .then(function(r) { return r.ok ? r.text() : null; })
    .then(function(t) {
      var n = parseInt(t);
      if (n && n > APP_VERSION && sessionStorage.getItem(APP_KEY + '_vreload') !== String(n)) {
        sessionStorage.setItem(APP_KEY + '_vreload', String(n));
        location.replace(location.pathname + '?v=' + n);
      }
    })
    .catch(function() {});
})();
document.getElementById('app-ver').textContent = APP_VERSION;

// ===== localStorage 保存・読込 =====
function loadState() {
  try { return JSON.parse(localStorage.getItem(APP_KEY)) || {}; }
  catch (e) { return {}; }
}
function saveState(s) {
  localStorage.setItem(APP_KEY, JSON.stringify(s));
}

// ===== メッセージ表示（トースト） =====
var msgTimer = null;
function showMessage(text, type) {
  var el = document.getElementById('msg');
  if (!text) { el.style.display = 'none'; return; }
  el.textContent = text;
  el.className = 'msg' + (type ? ' ' + type : '');
  el.style.display = 'block';
  clearTimeout(msgTimer);
  msgTimer = setTimeout(function() { el.style.display = 'none'; }, type === 'error' ? 5000 : 2500);
}

// ===== ユーティリティ =====
function genId(prefix) {
  return prefix + '_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7);
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, function(c) {
    return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
  });
}

// ===== IndexedDB ヘルパー（素材PNGのBlobのみ） =====
function idbOpen() {
  return new Promise(function(resolve, reject) {
    var req = indexedDB.open('overlay_db', 1);
    req.onupgradeneeded = function() { req.result.createObjectStore('pngs'); };
    req.onsuccess = function() { resolve(req.result); };
    req.onerror = function() { reject(req.error); };
  });
}
function idbPutPng(id, blob) {
  return idbOpen().then(function(db) {
    return new Promise(function(resolve, reject) {
      var tx = db.transaction('pngs', 'readwrite');
      tx.objectStore('pngs').put(blob, id);
      tx.oncomplete = function() { resolve(); };
      tx.onerror = function() { reject(tx.error); };
    });
  });
}
function idbGetPng(id) {
  return idbOpen().then(function(db) {
    return new Promise(function(resolve, reject) {
      var tx = db.transaction('pngs', 'readonly');
      var req = tx.objectStore('pngs').get(id);
      req.onsuccess = function() { resolve(req.result || null); };
      req.onerror = function() { reject(req.error); };
    });
  });
}
function idbDeletePng(id) {
  return idbOpen().then(function(db) {
    return new Promise(function(resolve, reject) {
      var tx = db.transaction('pngs', 'readwrite');
      tx.objectStore('pngs').delete(id);
      tx.oncomplete = function() { resolve(); };
      tx.onerror = function() { reject(tx.error); };
    });
  });
}

// ===== アプリ状態 =====
var state = null;
var bitmapCache = new Map();
var textCanvasCache = new WeakMap();
var tintCache = new Map();
var currentPhoto = null;
var selectedIndex = null;
var bulkResults = [];
var dragState = null;
var itemPanelCollapsed = false;
var anchorCollapsed = true;
var handlesVisible = true;

// ===== 合成エンジン（プレビューと最終出力で共通利用） =====

}
function computeCropRect(ratioVal, offset, srcW, srcH) {

  else { sw = srcW; sh = sw / ratioVal; }

    dx = (W - srcW) * offset; dy = 0;
  } else {
    W = srcW; H = Math.round(srcW / ratioVal);
    dx = 0; dy = (H - srcH) * offset;

}
function getCurrentRatioVal() {

  return r ? r.w / r.h : null;
}

// ===== テキストレイヤー描画 =====
function textFontFamily(font) {
  if (font === 'mincho') return '600 400px "Hiragino Mincho ProN", serif';
  if (font === 'maru') return '400px "Hiragino Maru Gothic ProN", "Hiragino Sans", sans-serif';
  return '600 400px -apple-system, "Hiragino Sans", sans-serif';
}
function renderTextCanvas(item) {
  var baseSize = 400, lineHeight = baseSize * 1.3;
  var fontFamily = textFontFamily(item.font);
  var lines = String(item.text || '').split('\n');
  var mctx = document.createElement('canvas').getContext('2d');
  mctx.font = fontFamily;
  var maxWidth = 1;
  lines.forEach(function(line) {
    var w = mctx.measureText(line || ' ').width;
    if (w > maxWidth) maxWidth = w;
  });
  var canvas = document.createElement('canvas');
  canvas.width = Math.ceil(maxWidth);
  canvas.height = Math.ceil(lineHeight * lines.length);
  var ctx = canvas.getContext('2d');
  ctx.font = fontFamily;
  ctx.fillStyle = item.color || '#ffffff';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  lines.forEach(function(line, i) {
    ctx.fillText(line, canvas.width / 2, i * lineHeight + lineHeight / 2);

  return { canvas: canvas, w: canvas.width, h: canvas.height };
}
function getTextCanvas(item) {
  if (!item.text) return null;
  var key = item.text + '|' + item.font + '|' + item.color;
  var cached = textCanvasCache.get(item);
  if (!cached || cached.key !== key) {
    var r = renderTextCanvas(item);
    cached = { key: key, canvas: r.canvas, w: r.w, h: r.h };
    textCanvasCache.set(item, cached);
  }
  return cached;
}

// iOS SafariはImageBitmapのdrawImageにshadowを適用しないため、素材はcanvasで保持する
function bitmapToCanvas(bmp) {
  var c = document.createElement('canvas');
  c.width = bmp.width; c.height = bmp.height;
  c.getContext('2d').drawImage(bmp, 0, 0);
  bmp.close();
  return c;
}

// iOS Safariはctx.shadow*とdrawImageの組み合わせが壊れている(影が出ず
// globalAlphaも無視される)ため、影は縮小→再拡大のぼかし近似で自前生成する
function makeShadowCanvas(src, w, h, blur, color) {
  var pad = Math.ceil(blur * 2);
  var full = document.createElement('canvas');
  full.width = Math.max(1, Math.round(w + pad * 2));
  full.height = Math.max(1, Math.round(h + pad * 2));
  var fctx = full.getContext('2d');
  fctx.drawImage(src, pad, pad, w, h);
  fctx.globalCompositeOperation = 'source-in';
  fctx.fillStyle = color || '#000';
  fctx.fillRect(0, 0, full.width, full.height);
  if (blur < 1) return { canvas: full, pad: pad };
  var scale = Math.max(2, Math.round(blur / 2));
  var small = document.createElement('canvas');
  small.width = Math.max(1, Math.round(full.width / scale));
  small.height = Math.max(1, Math.round(full.height / scale));
  var sctx = small.getContext('2d');
  sctx.imageSmoothingEnabled = true;
  sctx.imageSmoothingQuality = 'high';
  sctx.drawImage(full, 0, 0, small.width, small.height);
  var out = document.createElement('canvas');
  out.width = full.width;
  out.height = full.height;
  var octx = out.getContext('2d');
  octx.imageSmoothingEnabled = true;
  octx.imageSmoothingQuality = 'high';
  octx.drawImage(small, 0, 0, out.width, out.height);
  return { canvas: out, pad: pad };
}

// ===== ティント（単色ロゴの色変換） =====
function getTintedCanvas(asset, tint) {
  var key = asset.id + '|' + tint;
  if (tintCache.has(key)) return tintCache.get(key);
  var bmp = bitmapCache.get(asset.id);
  if (!bmp) return null;
  var c = document.createElement('canvas');
  c.width = asset.w; c.height = asset.h;
  var cctx = c.getContext('2d');
  cctx.drawImage(bmp, 0, 0);
  cctx.globalCompositeOperation = 'source-in';
  cctx.fillStyle = tint;
  cctx.fillRect(0, 0, asset.w, asset.h);
  tintCache.set(key, c);
  return c;
}

// ===== レンダリング取得（素材/テキスト共通） =====
function getItemRender(item) {
  if (item.type === 'text') {
    var tc = getTextCanvas(item);
    if (!tc) return null;
    return { w: tc.w, h: tc.h, src: tc.canvas, name: item.text };
  }
  var asset = state.assets.find(function(a) { return a.id === item.assetId; });
  if (!asset || !bitmapCache.has(item.assetId)) return null;
  var src = item.tint ? getTintedCanvas(asset, item.tint) : bitmapCache.get(item.assetId);
  if (!src) return null;
  return { w: asset.w, h: asset.h, src: src, name: asset.name };
}

// ===== スクリム（グラデーション暗幕） =====

    grad.addColorStop(0, 'rgba(0,0,0,0)');

    ctx.fillStyle = grad;
    ctx.fillRect(0, H - h, W, h);
  } else if (scrim.pos === 'top') {
    grad = ctx.createLinearGradient(0, 0, 0, h);
    grad.addColorStop(0, 'rgba(0,0,0,' + scrim.strength + ')');
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, h);
  }
}
function drawComposite(ctx, photoBitmap, items, W, H, layout) {

  if (layout && layout.pad) {
    ctx.fillStyle = state.settings.padColor || '#ffffff';
    ctx.fillRect(0, 0, W, H);
    ctx.drawImage(photoBitmap, layout.pad.dx, layout.pad.dy, layout.pad.dw, layout.pad.dh);
  } else if (layout && layout.crop) {
    ctx.drawImage(photoBitmap, layout.crop.sx, layout.crop.sy, layout.crop.sw, layout.crop.sh, 0, 0, W, H);
  } else {
    ctx.drawImage(photoBitmap, 0, 0, W, H);
  }
  drawScrim(ctx, W, H, state.current.scrim);
  items.forEach(function(item) {
    if (!item.enabled) return;
    var render = getItemRender(item);
    if (!render) return;
    var r = computeRect(item, render, W, H);
    var rot = (item.rotation || 0) * Math.PI / 180;
    ctx.save();
    if (rot) {
      ctx.translate(r.x + r.w / 2, r.y + r.h / 2);
      ctx.rotate(rot);
    }
    var dx = rot ? -r.w / 2 : r.x;
    var dy = rot ? -r.h / 2 : r.y;
    if (item.shadow) {
      var blur = r.w * (item.shadowBlur != null ? item.shadowBlur : 8) / 100;
      var offY = r.w * (item.shadowDist != null ? item.shadowDist : 2) / 100;
      var sh = makeShadowCanvas(render.src, r.w, r.h, blur, item.shadowColor || '#000000');
      ctx.globalAlpha = item.opacity * 0.55;
      ctx.drawImage(sh.canvas, dx - sh.pad, dy - sh.pad + offY);

    ctx.globalAlpha = item.opacity;
    ctx.drawImage(render.src, dx, dy, r.w, r.h);
    ctx.restore();

var HANDLE_ACCENT = '#4dabf7';

    cx: cx, cy: cy,
    topX: cx + (r.h / 2) * Math.sin(rot), topY: cy - (r.h / 2) * Math.cos(rot),

  ctx.restore();

    lx = item.anchor[1] === 'l' ? r.w / 2 : -r.w / 2;

  return {

function rectToPlacement(x, y, w, h, W, H, widthPercent) {

  var pcx = W / 2, pcy = H / 2;
  var anchor, marginX, marginY;
  if (Math.abs(cx - pcx) < 0.12 * W && Math.abs(cy - pcy) < 0.12 * H) {

// ===== 写真読み込み =====
var MAX_PIXELS = 16777216;
function downscaleBitmap(bmp, w, h) {
  var c = document.createElement('canvas');
  c.width = w; c.height = h;
  var ctx = c.getContext('2d');
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
  ctx.drawImage(bmp, 0, 0, w, h);
  return createImageBitmap(c);
}
async function loadPhoto(file) {
  var bmp;
  try { bmp = await createImageBitmap(file, { imageOrientation: 'from-image' }); }
  catch (e) {
    try { bmp = await createImageBitmap(file); }
    catch (e2) { throw new Error('この画像形式は読み込めません'); }
  }
  var W = bmp.width, H = bmp.height, warned = false;
  if (W * H > MAX_PIXELS) {
    var scale = Math.sqrt(MAX_PIXELS / (W * H));
    var nw = Math.floor(W * scale), nh = Math.floor(H * scale);
    var resized = await downscaleBitmap(bmp, nw, nh);
    bmp.close();
    bmp = resized; W = nw; H = nh; warned = true;
  }
  var preview = bmp, pw = W, ph = H;
  var longEdge = Math.max(W, H);
  if (longEdge > 1600) {
    var s = 1600 / longEdge;
    pw = Math.round(W * s); ph = Math.round(H * s);
    preview = await downscaleBitmap(bmp, pw, ph);
  }
  return { full: bmp, fullW: W, fullH: H, preview: preview, previewW: pw, previewH: ph, warned: warned };
}

// ===== プレビュー描画 =====
function redrawPreview() {
  var canvas = document.getElementById('preview-canvas');
  var empty = document.getElementById('preview-empty');
  if (!currentPhoto) {
    canvas.style.display = 'none';
    empty.style.display = 'block';
    return;
  }
  canvas.style.display = 'block';
  empty.style.display = 'none';
  var eff = getEffectivePreviewSize();
  canvas.width = eff.W;
  canvas.height = eff.H;
  var ctx = canvas.getContext('2d');
  drawComposite(ctx, currentPhoto.preview, state.current.items, eff.W, eff.H, eff);
  var item = selectedIndex != null ? state.current.items[selectedIndex] : null;
  var render = item ? getItemRender(item) : null;
  if (item && render && handlesVisible) {
    drawSelectionHandle(ctx, item, render, eff.W, eff.H);
    drawResizeHandle(ctx, item, render, eff.W, eff.H);
  }
}

// ===== タブ切替 =====
function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.toggle('active', b.dataset.tab === name); });
  document.querySelectorAll('.tab-panel').forEach(function(s) { s.classList.toggle('active', s.id === 'tab-' + name); });
}
function setupTabs() {
  document.querySelectorAll('.tab-btn').forEach(function(b) {
    b.addEventListener('click', function() { switchTab(b.dataset.tab); });
  });
}

// ===== 素材チップ =====
function markDirty() {
  state.current.appliedPresetId = null;
}
function centerItem(i) {
  var item = state.current.items[i];
  if (!item) return;
  item.anchor = 'c';
  item.marginX = 0;
  item.marginY = 0;
  markDirty(); saveState(state);
  renderItemPanel(); renderChips(); redrawPreview();
}
function renderChips() {
  var wrap = document.getElementById('chips');
  wrap.innerHTML = '';
  state.current.items.forEach(function(item, i) {
    var render = getItemRender(item);
    var label = render ? (item.type === 'text' ? '✏ ' + (render.name.split('\n')[0].slice(0, 8) || '(空)') : render.name) : '(不明)';
    var chip = document.createElement('div');
    chip.className = 'chip' + (i === selectedIndex ? ' active' : '') + (item.enabled ? '' : ' disabled');
    chip.innerHTML =
      '<span class="chip-name">' + escapeHtml(label) + '</span>' +
      '<button class="chip-center" type="button" data-i="' + i + '" title="中央に戻す">⌖</button>' +
      '<button class="chip-toggle" type="button" data-i="' + i + '">' + (item.enabled ? 'ON' : 'OFF') + '</button>' +
      '<button class="chip-up" type="button" data-i="' + i + '">⬆</button>' +
      '<button class="chip-down" type="button" data-i="' + i + '">⬇</button>';
    chip.addEventListener('click', function(e) {
      if (e.target.closest('button')) return;
      selectedIndex = i;
      renderChips(); renderItemPanel(); redrawPreview();
    });
    wrap.appendChild(chip);
  });
  wrap.querySelectorAll('.chip-center').forEach(function(b) {
    b.addEventListener('click', function(e) {
      e.stopPropagation();
      centerItem(+b.dataset.i);
    });
  });
  wrap.querySelectorAll('.chip-toggle').forEach(function(b) {
    b.addEventListener('click', function(e) {
      e.stopPropagation();
      var i = +b.dataset.i;
      state.current.items[i].enabled = !state.current.items[i].enabled;
      markDirty(); saveState(state);
      renderChips(); redrawPreview();
    });
  });
  wrap.querySelectorAll('.chip-up').forEach(function(b) {
    b.addEventListener('click', function(e) {
      e.stopPropagation();
      var i = +b.dataset.i;
      if (i > 0) {
        var items = state.current.items;
        var tmp = items[i - 1]; items[i - 1] = items[i]; items[i] = tmp;
        if (selectedIndex === i) selectedIndex = i - 1; else if (selectedIndex === i - 1) selectedIndex = i;
        markDirty(); saveState(state);
        renderChips(); redrawPreview();
      }
    });
  });
  wrap.querySelectorAll('.chip-down').forEach(function(b) {
    b.addEventListener('click', function(e) {
      e.stopPropagation();
      var i = +b.dataset.i;
      var items = state.current.items;
      if (i < items.length - 1) {
        var tmp = items[i + 1]; items[i + 1] = items[i]; items[i] = tmp;
        if (selectedIndex === i) selectedIndex = i + 1; else if (selectedIndex === i + 1) selectedIndex = i;
        markDirty(); saveState(state);
        renderChips(); redrawPreview();
      }
    });
  });
}

// ===== 設定パネル =====
function renderItemPanel() {
  var panel = document.getElementById('item-panel');
  var item = selectedIndex != null ? state.current.items[selectedIndex] : null;
  if (!item) { panel.style.display = 'none'; return; }
  panel.style.display = 'block';
  var isText = item.type === 'text';
  var render = getItemRender(item);
  document.getElementById('item-panel-title').textContent = isText
    ? ('✏ ' + (String(item.text || '').split('\n')[0].slice(0, 12) || '(空)'))
    : (render ? render.name : '(不明)');
  document.getElementById('item-panel-body').style.display = itemPanelCollapsed ? 'none' : 'block';
  document.getElementById('panel-toggle-btn').textContent = itemPanelCollapsed ? '▼' : '▲';
  document.getElementById('handle-toggle-btn').textContent = handlesVisible ? '✅' : '❎';
  document.getElementById('handle-toggle-btn').classList.toggle('active', !handlesVisible);

  document.getElementById('text-section').style.display = isText ? 'block' : 'none';
  if (isText) {
    var textInput = document.getElementById('text-content');
    if (document.activeElement !== textInput) textInput.value = item.text || '';
    document.getElementById('text-font-select').value = item.font;
    document.getElementById('text-color').value = item.color;
  }

  document.getElementById('tint-section').style.display = (!isText) ? 'block' : 'none';

// ===== プレビュー上のドラッグ =====
function canvasToPhoto(evt) {
  var canvas = document.getElementById('preview-canvas');
  var rect = canvas.getBoundingClientRect();
  return {
    x: (evt.clientX - rect.left) * (canvas.width / rect.width),
    y: (evt.clientY - rect.top) * (canvas.height / rect.height)
  };
}
function hitTest(px, py) {
  var eff = getEffectivePreviewSize();
  var W = eff.W, H = eff.H;
  for (var i = state.current.items.length - 1; i >= 0; i--) {
    var item = state.current.items[i];
    if (!item.enabled) continue;
    var render = getItemRender(item);
    if (!render) continue;
    var r = computeRect(item, render, W, H);
    var cx = r.x + r.w / 2, cy = r.y + r.h / 2;
    var rot = (item.rotation || 0) * Math.PI / 180;
    var dx = px - cx, dy = py - cy, lx = dx, ly = dy;
    if (rot) {
      var cos = Math.cos(-rot), sin = Math.sin(-rot);
      lx = dx * cos - dy * sin;
      ly = dx * sin + dy * cos;
    }
    if (lx >= -r.w / 2 && lx <= r.w / 2 && ly >= -r.h / 2 && ly <= r.h / 2) return i;
  }
  return -1;
}
function handleHitTest(px, py) {
  if (!handlesVisible || selectedIndex == null) return null;
  var item = state.current.items[selectedIndex];
  if (!item || !item.enabled) return null;
  var render = getItemRender(item);
  if (!render) return null;
  var eff = getEffectivePreviewSize();
  var W = eff.W, H = eff.H;
  var tol = Math.max(20, W * 0.03);
  var rp = computeHandlePos(item, render, W, H);
  if (Math.hypot(px - rp.hx, py - rp.hy) <= tol) return 'rotate';
  var sp = computeResizeHandlePos(item, render, W, H);
  if (Math.hypot(px - sp.fx, py - sp.fy) <= tol) return 'resize';
  return null;
}
function normalizeDeg(deg) {
  return ((deg + 180) % 360 + 360) % 360 - 180;
}
function setupDrag() {
  var canvas = document.getElementById('preview-canvas');
  canvas.addEventListener('pointerdown', function(evt) {
    if (!currentPhoto) return;
    var p = canvasToPhoto(evt);
    var mode = handleHitTest(p.x, p.y);
    var eff = getEffectivePreviewSize();
    if (mode === 'rotate') {
      var item = state.current.items[selectedIndex];
      var render = getItemRender(item);
      var r = computeRect(item, render, eff.W, eff.H);
      dragState = { mode: 'rotate', i: selectedIndex, cx: r.x + r.w / 2, cy: r.y + r.h / 2 };
      canvas.setPointerCapture(evt.pointerId);
      return;
    }
    if (mode === 'resize') {
      var item = state.current.items[selectedIndex];
      var render = getItemRender(item);
      var r = computeRect(item, render, eff.W, eff.H);
      var cx = r.x + r.w / 2, cy = r.y + r.h / 2;
      var rot = (item.rotation || 0) * Math.PI / 180;
      var aspect = render.h / render.w;
      if (item.anchor === 'c') {
        dragState = { mode: 'resize', i: selectedIndex, refX: cx, refY: cy, aspect: aspect, diagFactor: 2 };
      } else {
        var lx = item.anchor[1] === 'l' ? -r.w / 2 : r.w / 2;
        var ly = item.anchor[0] === 't' ? -r.h / 2 : r.h / 2;
        var refX = cx + lx * Math.cos(rot) - ly * Math.sin(rot);
        var refY = cy + lx * Math.sin(rot) + ly * Math.cos(rot);
        dragState = { mode: 'resize', i: selectedIndex, refX: refX, refY: refY, aspect: aspect, diagFactor: 1 };
      }
      canvas.setPointerCapture(evt.pointerId);
      return;
    }
    var i = hitTest(p.x, p.y);
    if (i === -1) {
      var ratioVal = getCurrentRatioVal();
      if (ratioVal) {
        var srcW = currentPhoto.previewW, srcH = currentPhoto.previewH;
        var srcRatio = srcW / srcH;
        var isPad = state.current.fitMode === 'pad';
        var maxX, maxY;
        if (isPad) {
          maxX = srcRatio < ratioVal ? (srcH * ratioVal - srcW) : 0;
          maxY = srcRatio < ratioVal ? 0 : (srcW / ratioVal - srcH);
        } else {
          maxX = srcRatio > ratioVal ? (srcW - srcH * ratioVal) : 0;
          maxY = srcRatio > ratioVal ? 0 : (srcH - srcW / ratioVal);
        }
        if (maxX > 0 || maxY > 0) {
          dragState = { mode: 'crop', startOffset: state.current.cropOffset, startPX: p.x, startPY: p.y, maxX: maxX, maxY: maxY, sign: isPad ? 1 : -1 };
          canvas.setPointerCapture(evt.pointerId);
        }
      }
      return;
    }
    var item = state.current.items[i];
    var render = getItemRender(item);
    var r = computeRect(item, render, eff.W, eff.H);
    selectedIndex = i;
    dragState = { mode: 'move', i: i, offsetX: p.x - r.x, offsetY: p.y - r.y, w: r.w, h: r.h };
    canvas.setPointerCapture(evt.pointerId);
    renderChips(); renderItemPanel();
  });
  canvas.addEventListener('pointermove', function(evt) {
    if (!dragState) return;
    evt.preventDefault();
    var p = canvasToPhoto(evt);
    if (dragState.mode === 'crop') {
      var dx = p.x - dragState.startPX, dy = p.y - dragState.startPY;
      var delta = dragState.maxX > 0 ? dx : dy;
      var maxSlack = dragState.maxX > 0 ? dragState.maxX : dragState.maxY;
      state.current.cropOffset = Math.max(0, Math.min(1, dragState.startOffset + dragState.sign * delta / maxSlack));
      redrawPreview();
      return;
    }
    var item = state.current.items[dragState.i];
    if (dragState.mode === 'rotate') {
      var rad = Math.atan2(p.x - dragState.cx, -(p.y - dragState.cy));
      item.rotation = Math.round(normalizeDeg(rad * 180 / Math.PI));
      redrawPreview(); renderItemPanel();
      return;
    }
    if (dragState.mode === 'resize') {
      var W = getEffectivePreviewSize().W;
      var dist = Math.hypot(p.x - dragState.refX, p.y - dragState.refY);
      var fullDiagonal = dist * dragState.diagFactor;
      var newW = fullDiagonal / Math.sqrt(1 + dragState.aspect * dragState.aspect);
      var pct = newW / W * 100;
      item.widthPercent = Math.max(1, Math.min(80, Math.round(pct * 10) / 10));
      redrawPreview(); renderItemPanel();
      return;
    }
    var effMove = getEffectivePreviewSize();
    var W = effMove.W, H = effMove.H;
    var placement = rectToPlacement(p.x - dragState.offsetX, p.y - dragState.offsetY, dragState.w, dragState.h, W, H, item.widthPercent);
    item.anchor = placement.anchor;
    item.marginX = placement.marginX;
    item.marginY = placement.marginY;
    redrawPreview(); renderItemPanel();
  });
  function endDrag() {
    if (!dragState) return;
    dragState = null;
    markDirty(); saveState(state);
    renderChips();
  }
  canvas.addEventListener('pointerup', endDrag);
  canvas.addEventListener('pointercancel', endDrag);
}

function saveSingle() {
  if (!currentPhoto) { showMessage('写真を選んでください', 'error'); return; }
  var eff = getEffectiveFullSize(currentPhoto);
  var canvas = document.createElement('canvas');
  canvas.width = eff.W;
  canvas.height = eff.H;
  drawComposite(canvas.getContext('2d'), currentPhoto.full, state.current.items, eff.W, eff.H, eff);
  var format = state.settings.format;
  var mime = format === 'png' ? 'image/png' : 'image/jpeg';
  var quality = format === 'png' ? undefined : state.settings.quality;
  canvas.toBlob(function(blob) {
    if (!blob) { showMessage('保存に失敗しました', 'error'); return; }
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    var base = (currentPhoto.name || 'photo').replace(/\.[^.]+$/, '');
    a.download = base + '_ol.' + (format === 'png' ? 'png' : 'jpg');
    a.click();
    URL.revokeObjectURL(a.href);
    showMessage('保存しました', 'success');
  }, mime, quality);
}

// ===== 一括合成 =====
async function bulkComposite(files) {
  bulkResults.forEach(function(r) { URL.revokeObjectURL(r.url); });
  bulkResults = [];
  renderBulkResults();
  var format = state.settings.format;
  var mime = format === 'png' ? 'image/png' : 'image/jpeg';
  var quality = format === 'png' ? undefined : state.settings.quality;
  for (var i = 0; i < files.length; i++) {
    showMessage((i + 1) + '/' + files.length + ' 処理中…');
    try {
      var photo = await loadPhoto(files[i]);
      var eff = getEffectiveFullSize(photo);
      var canvas = document.createElement('canvas');
      canvas.width = eff.W; canvas.height = eff.H;
      drawComposite(canvas.getContext('2d'), photo.full, state.current.items, eff.W, eff.H, eff);
      var blob = await new Promise(function(res) { canvas.toBlob(res, mime, quality); });
      photo.full.close();
      if (photo.preview !== photo.full) photo.preview.close();
      var base = files[i].name.replace(/\.[^.]+$/, '');
      var outName = base + '_ol.' + (format === 'png' ? 'png' : 'jpg');
      bulkResults.push({ name: outName, blob: blob, url: URL.createObjectURL(blob) });
    } catch (e) {
      showMessage(files[i].name + ': ' + e.message, 'error');
    }
    renderBulkResults();
  }
  showMessage('一括合成完了 (' + bulkResults.length + '/' + files.length + ')', 'success');
}
function renderBulkResults() {
  var wrap = document.getElementById('bulk-results');
  wrap.innerHTML = '';
  bulkResults.forEach(function(r) {
    var row = document.createElement('div');
    row.className = 'bulk-row';
    row.innerHTML = '<img class="bulk-thumb" src="' + r.url + '"><span class="bulk-name">' + escapeHtml(r.name) + '</span>';
    var btn = document.createElement('button');
    btn.type = 'button'; btn.textContent = '保存';
    btn.addEventListener('click', function() {
      var a = document.createElement('a');
      a.href = r.url; a.download = r.name; a.click();
    });
    row.appendChild(btn);
    wrap.appendChild(row);
  });
  document.getElementById('share-bulk-wrap').style.display = (bulkResults.length && navigator.canShare) ? 'block' : 'none';
}
async function shareBulk() {
  if (!bulkResults.length) return;
  var files = bulkResults.map(function(r) { return new File([r.blob], r.name, { type: r.blob.type }); });
  if (navigator.canShare && navigator.canShare({ files: files })) {
    try { await navigator.share({ files: files }); } catch (e) {}
  } else {
    showMessage('この環境では共有に対応していません', 'error');
  }
}

async function addAsset() {

  state.assets.push({ id: id, name: name, w: bmp.width, h: bmp.height, createdAt: Date.now() });

async function deleteAsset(id) {
  if (!confirm('この素材を削除しますか？配置設定・プリセットからも削除されます。')) return;
  try { await idbDeletePng(id); } catch (e) {}
  var bmp = bitmapCache.get(id);
  if (bmp && bmp.close) bmp.close();
  bitmapCache.delete(id);
  Array.from(tintCache.keys()).forEach(function(k) {
    if (k.indexOf(id + '|') === 0) tintCache.delete(k);
  });
  state.assets = state.assets.filter(function(a) { return a.id !== id; });
  state.current.items = state.current.items.filter(function(it) { return it.assetId !== id; });
  state.presets.forEach(function(p) { p.items = p.items.filter(function(it) { return it.assetId !== id; }); });
  if (selectedIndex != null && !state.current.items[selectedIndex]) selectedIndex = null;
  markDirty(); saveState(state);
  renderAssetList(); renderChips(); renderItemPanel(); renderPresetList(); redrawPreview();
  showMessage('削除しました', 'success');

function renderAssetList() {
  var wrap = document.getElementById('asset-list');
  wrap.innerHTML = '';
  state.assets.forEach(function(asset) {
    var card = document.createElement('div');
    card.className = 'asset-card' + (asset.missing ? ' missing' : '');
    var thumbWrap = document.createElement('div');
    thumbWrap.className = 'asset-thumb';
    if (!asset.missing && bitmapCache.has(asset.id)) {
      var c = document.createElement('canvas');
      c.width = 56; c.height = 56;
      var bmp = bitmapCache.get(asset.id);
      var scale = Math.min(56 / bmp.width, 56 / bmp.height);
      var w = bmp.width * scale, h = bmp.height * scale;
      c.getContext('2d').drawImage(bmp, (56 - w) / 2, (56 - h) / 2, w, h);
      thumbWrap.appendChild(c);
    } else {
      thumbWrap.textContent = '⚠';
    }
    card.appendChild(thumbWrap);
    var info = document.createElement('div');
    info.className = 'asset-info';
    info.innerHTML = '<div class="asset-name">' + escapeHtml(asset.name) + '</div>' +
      '<div class="asset-meta">' + asset.w + '×' + asset.h + (asset.missing ? ' (データ欠損)' : '') + '</div>';
    card.appendChild(info);
    var delBtn = document.createElement('button');
    delBtn.type = 'button'; delBtn.textContent = '削除';
    delBtn.addEventListener('click', function() { deleteAsset(asset.id); });
    card.appendChild(delBtn);
    wrap.appendChild(card);
  });
}

// ===== プリセットタブ =====
function savePresetHandler() {
  var input = document.getElementById('preset-name');
  var name = input.value.trim();
  if (!name) { showMessage('プリセット名を入力してください', 'error'); return; }
  if (!state.current.items.length) { showMessage('配置がありません', 'error'); return; }
  var preset = { id: genId('p'), name: name, items: structuredClone(state.current.items), scrim: structuredClone(state.current.scrim) };
  state.presets.push(preset);
  state.current.appliedPresetId = preset.id;
  saveState(state);
  input.value = '';
  renderPresetList();
  showMessage('プリセットを保存しました', 'success');
}
function applyPreset(id) {
  var preset = state.presets.find(function(p) { return p.id === id; });
  if (!preset) return;
  state.current.items = structuredClone(preset.items);
  if (preset.scrim) state.current.scrim = structuredClone(preset.scrim);
  state.current.appliedPresetId = id;
  selectedIndex = null;
  saveState(state);
  switchTab('edit');
  renderChips(); renderItemPanel(); renderScrimRow(); redrawPreview(); renderPresetList();
  showMessage('プリセットを適用しました', 'success');
}
function deletePreset(id) {
  if (!confirm('このプリセットを削除しますか？')) return;
  state.presets = state.presets.filter(function(p) { return p.id !== id; });
  if (state.current.appliedPresetId === id) state.current.appliedPresetId = null;
  saveState(state);
  renderPresetList();
}
function setupPresetsTab() {}
function renderPresetList() {
  var wrap = document.getElementById('preset-list');
  wrap.innerHTML = '';
  var appliedEl = document.getElementById('applied-preset');
  var applied = state.presets.find(function(p) { return p.id === state.current.appliedPresetId; });
  appliedEl.textContent = applied ? '適用中: ' + applied.name : '';
  state.presets.forEach(function(preset) {
    var row = document.createElement('div');
    row.className = 'preset-row' + (preset.id === state.current.appliedPresetId ? ' active' : '');
    var nameSpan = document.createElement('span');
    nameSpan.className = 'preset-name';
    nameSpan.textContent = preset.name;
    row.appendChild(nameSpan);
    var applyBtn = document.createElement('button');
    applyBtn.type = 'button'; applyBtn.textContent = '適用';
    applyBtn.addEventListener('click', function() { applyPreset(preset.id); });
    var delBtn = document.createElement('button');
    delBtn.type = 'button'; delBtn.textContent = '削除';
    delBtn.addEventListener('click', function() { deletePreset(preset.id); });
    row.appendChild(applyBtn); row.appendChild(delBtn);
    wrap.appendChild(row);
  });
}

// ===== 比率タブ =====
var selectedRatioCategory = null; // null = すべて（永続化しない）
function setupRatiosTab() {
  attachCategoryAutocomplete(document.getElementById('ratio-category'));
}
function attachCategoryAutocomplete(input) {
  var wrap = input.parentElement;
  var list = document.createElement('div');
  list.className = 'autocomplete-list';
  wrap.appendChild(list);
  function currentFragment() {
    var parts = input.value.split(/[,、]/);
    return parts[parts.length - 1].trim();
  }
  function applySuggestion(c) {
    var parts = input.value.split(/[,、]/);
    parts[parts.length - 1] = ' ' + c;
    input.value = parts.map(function(p) { return p.trim(); }).filter(function(p) { return p; }).join(', ');
    list.classList.remove('show');
    input.dispatchEvent(new Event('change', { bubbles: true }));
    input.focus();
  }
  function renderSuggestions() {
    var frag = currentFragment();
    var cats = getRatioCategories().filter(function(c) { return c !== '未分類'; });
    if (frag) cats = cats.filter(function(c) { return c.indexOf(frag) !== -1; });
    list.innerHTML = '';
    if (!cats.length) { list.classList.remove('show'); return; }
    cats.forEach(function(c) {
      var item = document.createElement('div');
      item.className = 'autocomplete-item';
      item.textContent = c;
      item.addEventListener('mousedown', function(e) { e.preventDefault(); });
      item.addEventListener('click', function() { applySuggestion(c); });
      list.appendChild(item);
    });
    list.classList.add('show');
  }
  input.addEventListener('input', renderSuggestions);
  input.addEventListener('focus', renderSuggestions);
  input.addEventListener('blur', function() {
    setTimeout(function() { list.classList.remove('show'); }, 150);
  });
}
function parseCategoriesInput(value) {
  return value.split(/[,、]/).map(function(c) { return c.trim(); }).filter(function(c) { return c; });
}
function ratioCategoriesRaw(ratio) {
  var arr = ratio.categories || (ratio.category ? [ratio.category] : []);
  return arr.map(function(c) { return c.trim(); }).filter(function(c) { return c; });
}
function ratioCategoriesOf(ratio) {
  var arr = ratioCategoriesRaw(ratio);
  return arr.length ? arr : ['未分類'];
}
function getRatioCategories() {
  var set = {};
  state.ratios.forEach(function(r) { ratioCategoriesOf(r).forEach(function(c) { set[c] = true; }); });
  return Object.keys(set);
}
function addRatio() {
  var nameInput = document.getElementById('ratio-name');
  var categoryInput = document.getElementById('ratio-category');
  var wInput = document.getElementById('ratio-w');
  var hInput = document.getElementById('ratio-h');
  var name = nameInput.value.trim();
  var categories = parseCategoriesInput(categoryInput.value);
  var w = parseFloat(wInput.value), h = parseFloat(hInput.value);
  if (!name) { showMessage('比率名を入力してください', 'error'); return; }
  if (!(w > 0) || !(h > 0)) { showMessage('幅・高さを正しく入力してください', 'error'); return; }
  state.ratios.push({ id: genId('r'), name: name, categories: categories, w: w, h: h });
  saveState(state);
  nameInput.value = ''; categoryInput.value = ''; wInput.value = ''; hInput.value = '';
  renderRatioList(); renderCategoryChips(); renderRatioChips();
  showMessage('比率を追加しました', 'success');
}
function deleteRatio(id) {
  if (!confirm('この比率を削除しますか？')) return;
  state.ratios = state.ratios.filter(function(r) { return r.id !== id; });
  if (state.current.ratioId === id) {
    state.current.ratioId = null;
    state.current.cropOffset = 0.5;
  }
  if (selectedRatioCategory !== null && getRatioCategories().indexOf(selectedRatioCategory) === -1) {
    selectedRatioCategory = null;
  }
  saveState(state);
  renderRatioList(); renderCategoryChips(); renderRatioChips(); redrawPreview();
  showMessage('削除しました', 'success');
}
function renderRatioList() {
  var wrap = document.getElementById('ratio-list');
  wrap.innerHTML = '';
  var groups = {};
  var order = [];
  state.ratios.forEach(function(ratio) {
    ratioCategoriesOf(ratio).forEach(function(cat) {
      if (!groups[cat]) { groups[cat] = []; order.push(cat); }
      groups[cat].push(ratio);
    });
  });
  order.forEach(function(cat) {
    var header = document.createElement('div');
    header.className = 'section-title';
    header.textContent = cat;
    wrap.appendChild(header);
    groups[cat].forEach(function(ratio) {
      var row = document.createElement('div');
      row.className = 'ratio-row';
      var line1 = document.createElement('div');
      line1.className = 'ratio-row-line';
      var nameInput = document.createElement('input');
      nameInput.type = 'text'; nameInput.value = ratio.name;
      nameInput.addEventListener('change', function() {
        ratio.name = nameInput.value.trim() || ratio.name;
        nameInput.value = ratio.name;
        saveState(state);
        renderRatioList(); renderRatioChips();
      });
      var delBtn = document.createElement('button');
      delBtn.type = 'button'; delBtn.textContent = '削除';
      delBtn.addEventListener('click', function() { deleteRatio(ratio.id); });
      line1.appendChild(nameInput); line1.appendChild(delBtn);

      var line2 = document.createElement('div');
      line2.className = 'ratio-row-line';
      var categoryWrap = document.createElement('div');
      categoryWrap.className = 'autocomplete-wrap';
      var categoryInput = document.createElement('input');
      categoryInput.type = 'text'; categoryInput.placeholder = 'カテゴリ(カンマ区切りで複数可)';
      categoryInput.autocomplete = 'off';
      categoryInput.value = ratioCategoriesRaw(ratio).join(', ');
      categoryInput.addEventListener('change', function() {
        ratio.categories = parseCategoriesInput(categoryInput.value);
        delete ratio.category;
        saveState(state);
        renderRatioList(); renderCategoryChips(); renderRatioChips();
      });
      categoryWrap.appendChild(categoryInput);
      attachCategoryAutocomplete(categoryInput);
      var wInput = document.createElement('input');
      wInput.type = 'number'; wInput.step = '0.1'; wInput.value = ratio.w;
      wInput.addEventListener('change', function() {
        var v = parseFloat(wInput.value);
        if (v > 0) { ratio.w = v; saveState(state); renderRatioList(); redrawPreview(); }
        else { wInput.value = ratio.w; }
      });
      var hInput = document.createElement('input');
      hInput.type = 'number'; hInput.step = '0.1'; hInput.value = ratio.h;
      hInput.addEventListener('change', function() {
        var v = parseFloat(hInput.value);
        if (v > 0) { ratio.h = v; saveState(state); renderRatioList(); redrawPreview(); }
        else { hInput.value = ratio.h; }
      });
      line2.appendChild(categoryWrap); line2.appendChild(wInput); line2.appendChild(hInput);

      row.appendChild(line1); row.appendChild(line2);
      wrap.appendChild(row);
    });
  });
}
function selectRatio(id) {
  state.current.ratioId = id;
  state.current.cropOffset = 0.5;
  saveState(state);
  renderRatioChips();
  renderFitModeRow();
  redrawPreview();
}
function renderFitModeRow() {
  var row = document.getElementById('fit-mode-row');
  if (state.current.ratioId == null) { row.style.display = 'none'; return; }
  row.style.display = 'flex';
  var mode = state.current.fitMode || 'crop';
  document.getElementById('fit-crop-chip').className = 'chip' + (mode === 'crop' ? ' active' : '');
  document.getElementById('fit-pad-chip').className = 'chip' + (mode === 'pad' ? ' active' : '');
  var colorInput = document.getElementById('pad-color');
  colorInput.style.display = mode === 'pad' ? 'block' : 'none';
  colorInput.value = state.settings.padColor || '#ffffff';
}
function setFitMode(mode) {
  state.current.fitMode = mode;
  state.current.cropOffset = 0.5;
  saveState(state);
  renderFitModeRow();
  redrawPreview();
}
function setupFitModeRow() {
  document.getElementById('fit-crop-chip').addEventListener('click', function() { setFitMode('crop'); });
  document.getElementById('fit-pad-chip').addEventListener('click', function() { setFitMode('pad'); });
  document.getElementById('pad-color').addEventListener('input', function(e) {
    state.settings.padColor = e.target.value;
    saveState(state);
    redrawPreview();
  });
}

// ===== スクリムUI =====
function setScrimPos(pos) {
  state.current.scrim.pos = pos;
  markDirty(); saveState(state);
  renderScrimRow(); redrawPreview();
}
function renderScrimRow() {
  var scrim = state.current.scrim;
  document.getElementById('scrim-off-chip').className = 'chip' + (scrim.pos === 'off' ? ' active' : '');
  document.getElementById('scrim-bottom-chip').className = 'chip' + (scrim.pos === 'bottom' ? ' active' : '');
  document.getElementById('scrim-top-chip').className = 'chip' + (scrim.pos === 'top' ? ' active' : '');
  var on = scrim.pos !== 'off';
  document.getElementById('scrim-strength-row').style.display = on ? 'block' : 'none';
  document.getElementById('scrim-range-row').style.display = on ? 'block' : 'none';
  document.getElementById('scrim-strength-slider').value = scrim.strength;
  document.getElementById('scrim-strength-value').textContent = Math.round(scrim.strength * 100) + '%';
  document.getElementById('scrim-range-slider').value = scrim.range;
  document.getElementById('scrim-range-value').textContent = scrim.range + '%';
}
function setupScrimRow() {
  document.getElementById('scrim-off-chip').addEventListener('click', function() { setScrimPos('off'); });
  document.getElementById('scrim-bottom-chip').addEventListener('click', function() { setScrimPos('bottom'); });
  document.getElementById('scrim-top-chip').addEventListener('click', function() { setScrimPos('top'); });
  document.getElementById('scrim-strength-slider').addEventListener('input', function(e) {
    state.current.scrim.strength = +e.target.value;
    markDirty(); saveState(state);
    renderScrimRow(); redrawPreview();
  });
  document.getElementById('scrim-range-slider').addEventListener('input', function(e) {
    state.current.scrim.range = +e.target.value;
    markDirty(); saveState(state);
    renderScrimRow(); redrawPreview();
  });
}

function selectRatioCategory(cat) {
  selectedRatioCategory = cat;
  renderCategoryChips();
  renderRatioChips();
}
function renderCategoryChips() {
  var wrap = document.getElementById('category-chips');
  wrap.innerHTML = '';
  var allChip = document.createElement('div');
  allChip.className = 'chip' + (selectedRatioCategory === null ? ' active' : '');
  allChip.innerHTML = '<span class="chip-name">すべて</span>';
  allChip.addEventListener('click', function() { selectRatioCategory(null); });
  wrap.appendChild(allChip);
  getRatioCategories().forEach(function(cat) {
    var chip = document.createElement('div');
    chip.className = 'chip' + (selectedRatioCategory === cat ? ' active' : '');
    chip.innerHTML = '<span class="chip-name">' + escapeHtml(cat) + '</span>';
    chip.addEventListener('click', function() { selectRatioCategory(cat); });
    wrap.appendChild(chip);
  });
}
function renderRatioChips() {
  var wrap = document.getElementById('ratio-chips');
  wrap.innerHTML = '';
  var origChip = document.createElement('div');
  origChip.className = 'chip' + (state.current.ratioId == null ? ' active' : '');
  origChip.innerHTML = '<span class="chip-name">元の比率</span>';
  origChip.addEventListener('click', function() { selectRatio(null); });
  wrap.appendChild(origChip);
  state.ratios.filter(function(ratio) {
    return selectedRatioCategory === null || ratioCategoriesOf(ratio).indexOf(selectedRatioCategory) !== -1;
  }).forEach(function(ratio) {
    var chip = document.createElement('div');
    chip.className = 'chip' + (state.current.ratioId === ratio.id ? ' active' : '');
    chip.innerHTML = '<span class="chip-name">' + escapeHtml(ratio.name) + '</span>';
    chip.addEventListener('click', function() { selectRatio(ratio.id); });
    wrap.appendChild(chip);
  });
}

// ===== バックアップ（エクスポート／インポート、素材PNGを内包） =====
function blobToDataURL(blob) {
  return new Promise(function(resolve, reject) {
    var r = new FileReader();
    r.onload = function() { resolve(r.result); };
    r.onerror = reject;
    r.readAsDataURL(blob);
  });
}
async function exportData() {
  var s = loadState();
  var assetBlobs = [];
  for (var i = 0; i < (s.assets || []).length; i++) {
    var asset = s.assets[i];
    try {
      var blob = await idbGetPng(asset.id);
      if (blob) assetBlobs.push({ id: asset.id, dataURL: await blobToDataURL(blob) });
    } catch (e) {}
  }
  var payload = Object.assign({}, s, { assetBlobs: assetBlobs });
  var blobOut = new Blob([JSON.stringify(payload)], { type: 'application/json' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blobOut);
  a.download = APP_NAME + '_' + new Date().toISOString().slice(0, 10) + '.json';
  a.click();
  URL.revokeObjectURL(a.href);
}
async function importData(ev) {
  var file = ev.target.files[0];
  if (!file) return;
  try {
    var text = await file.text();
    var data = JSON.parse(text);
    if (!confirm('現在のデータを取り込んだ内容で上書きします。よろしいですか？')) { ev.target.value = ''; return; }
    var assetBlobs = data.assetBlobs || [];
    delete data.assetBlobs;
    saveState(data);
    for (var i = 0; i < assetBlobs.length; i++) {
      try {
        var res = await fetch(assetBlobs[i].dataURL);
        var blob = await res.blob();
        await idbPutPng(assetBlobs[i].id, blob);
      } catch (e) {}
    }
    location.reload();
  } catch (e) {
    showMessage('読み込みに失敗しました: ' + e.message, 'error');
  }
  ev.target.value = '';
}

// ===== 初期化 =====
async function init() {
  state = loadState();
  state.assets = state.assets || [];
  state.current = state.current || { items: [] };
  state.current.items = state.current.items || [];
  state.presets = state.presets || [];
  state.settings = state.settings || { format: 'jpeg', quality: 0.92 };
  state.ratios = state.ratios || [
    { id: genId('r'), name: 'スクエア', categories: ['インスタ用'], w: 1, h: 1 },
    { id: genId('r'), name: '縦(4:5)', categories: ['インスタ用'], w: 4, h: 5 },
    { id: genId('r'), name: 'ストーリーズ', categories: ['インスタ用'], w: 9, h: 16 },
    { id: genId('r'), name: '横(16:9)', categories: ['インスタ用'], w: 16, h: 9 }
  ];
  if (state.current.ratioId === undefined) state.current.ratioId = null;
  if (state.current.cropOffset === undefined) state.current.cropOffset = 0.5;
  if (state.current.fitMode === undefined) state.current.fitMode = 'crop';
  if (!state.settings.padColor) state.settings.padColor = '#ffffff';
  if (!state.current.scrim) state.current.scrim = { pos: 'off', strength: 0.6, range: 40 };

  for (var i = 0; i < state.assets.length; i++) {
    var asset = state.assets[i];
    try {
      var blob = await idbGetPng(asset.id);
      if (blob) {
        bitmapCache.set(asset.id, bitmapToCanvas(await createImageBitmap(blob)));
        asset.missing = false;
      } else {
        asset.missing = true;
      }
    } catch (e) {
      asset.missing = true;
    }
  }

  setupTabs();
  setupEditTab();
  setupFitModeRow();
  setupScrimRow();
  setupAssetsTab();
  setupPresetsTab();
  setupRatiosTab();
  renderChips();
  renderCategoryChips();
  renderRatioChips();
  renderFitModeRow();
  renderScrimRow();
  renderItemPanel();
  renderAssetList();
  renderPresetList();
  renderRatioList();
  redrawPreview();
}
init();
</script>
