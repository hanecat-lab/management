<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="家計簿" />
  <title>家計簿</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background: #EEF3FF; font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif; color: #1C2D50; min-height: 100dvh; }
    input, select, button { font-family: inherit; }
    input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
    ::-webkit-scrollbar { display: none; }
    .shell { max-width: 480px; margin: 0 auto; min-height: 100dvh; background: #EEF3FF; display: flex; flex-direction: column; }
    .hdr { background: linear-gradient(135deg,#1C3561 0%,#2547A1 100%); padding: env(safe-area-inset-top,0px) 0 0; position: sticky; top: 0; z-index: 50; }
    .hdr-inner { padding: 14px 18px 0; }
    .hdr-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .hdr-title { font-size: 18px; font-weight: 800; color: #fff; letter-spacing: .5px; }
    .hdr-sub { font-size: 11px; color: #A8C4F0; margin-top: 1px; }
    .hdr-actions { display: flex; gap: 8px; }
    .hdr-btn { background: rgba(255,255,255,.15); border: none; border-radius: 8px; color: #fff; font-size: 11px; padding: 6px 10px; cursor: pointer; font-weight: 600; }
    .tabs { display: flex; background: rgba(0,0,0,.2); border-radius: 12px 12px 0 0; margin: 0 10px; overflow: hidden; }
    .tab { flex: 1; padding: 10px 4px 8px; border: none; background: transparent; color: rgba(255,255,255,.6); font-size: 10.5px; font-weight: 600; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px; transition: all .2s; letter-spacing: .3px; }
    .tab span:first-child { font-size: 16px; }
    .tab.on { background: rgba(255,255,255,.15); color: #fff; }
    .page { flex: 1; overflow-y: auto; padding: 14px; }
    .card { background: #fff; border-radius: 18px; padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 12px rgba(28,53,97,.08); }
    .card-hd { font-size: 11.5px; font-weight: 700; color: #8AAAD0; text-transform: uppercase; letter-spacing: .8px; margin-bottom: 12px; }
    .sum-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .sum-box { background: #F0F5FF; border-radius: 12px; padding: 10px 12px; }
    .sum-lbl { font-size: 10px; color: #6080B0; margin-bottom: 4px; font-weight: 600; }
    .sum-val { font-size: 20px; font-weight: 800; }
    .c-blue { color: #1C3561; }
    .c-red { color: #D44; }
    .c-green { color: #2A8; }
    .c-orange { color: #E80; }
    .c-gray { color: #8AAAD0; }
    .bud-wrap { margin-top: 12px; }
    .bud-row { display: flex; justify-content: space-between; font-size: 11px; color: #6080B0; margin-bottom: 5px; }
    .bar-bg { height: 8px; background: #E0E8F8; border-radius: 4px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 4px; transition: width .4s; }
    .lst { }
    .lst-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid #EEF3FF; }
    .lst-item:last-child { border-bottom: none; }
    .lst-icon { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
    .lst-main { flex: 1; min-width: 0; }
    .lst-name { font-size: 13.5px; font-weight: 600; color: #1C2D50; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .lst-sub { font-size: 11px; color: #8AAAD0; margin-top: 2px; }
    .lst-amt { font-size: 14px; font-weight: 700; flex-shrink: 0; }
    .btn { border: none; border-radius: 12px; cursor: pointer; font-weight: 700; transition: opacity .15s; }
    .btn:active { opacity: .8; }
    .btn-primary { background: linear-gradient(135deg,#1C3561,#2547A1); color: #fff; }
    .btn-secondary { background: #E8EEFF; color: #2547A1; }
    .btn-danger { background: #FFF0F0; color: #D44; border: 1px solid #FFD0D0; }
    .btn-warn { background: linear-gradient(135deg,#E80,#F90); color: #fff; }
    .btn-full { width: 100%; padding: 13px; font-size: 15px; }
    .btn-sm { padding: 7px 13px; font-size: 12px; border-radius: 9px; }
    .btn-xs { padding: 5px 9px; font-size: 11px; border-radius: 7px; }
    .fld { margin-bottom: 12px; }
    .fld label { display: block; font-size: 11.5px; font-weight: 700; color: #6080B0; margin-bottom: 5px; }
    .inp { width: 100%; padding: 11px 13px; border: 1.5px solid #D8E4F4; border-radius: 11px; font-size: 14px; background: #FAFCFF; color: #1C2D50; transition: border-color .2s; }
    .inp:focus { outline: none; border-color: #2547A1; background: #fff; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .cat-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 14px; }
    .cat-btn { border: 2px solid #E0E8F8; border-radius: 11px; background: #fff; cursor: pointer; padding: 8px 4px; text-align: center; transition: all .2s; }
    .cat-btn.sel { border-color: #2547A1; background: #EEF3FF; }
    .cat-btn .ce { font-size: 19px; }
    .cat-btn .cl { font-size: 9.5px; color: #6080B0; margin-top: 2px; font-weight: 600; }
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 100; display: flex; align-items: flex-end; justify-content: center; }
    .sheet { background: #fff; border-radius: 22px 22px 0 0; padding: 16px 18px calc(env(safe-area-inset-bottom,0px) + 24px); width: 100%; max-width: 480px; max-height: 92dvh; overflow-y: auto; }
    .sheet-hdl { width: 36px; height: 4px; background: #DDE8F8; border-radius: 2px; margin: 0 auto 16px; }
    .sheet-ttl { font-size: 17px; font-weight: 800; text-align: center; color: #1C3561; margin-bottom: 16px; }
    .toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); background: #1C3561; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 13px; z-index: 200; white-space: nowrap; animation: fadeUp .3s ease; pointer-events: none; }
    @keyframes fadeUp { from { opacity: 0; transform: translateX(-50%) translateY(8px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
    .stat3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
    .stat-box { background: #FFF8EE; border-radius: 11px; padding: 10px; text-align: center; }
    .stat-val { font-size: 17px; font-weight: 800; color: #E80; }
    .stat-lbl { font-size: 10px; color: #A08040; margin-top: 2px; }
    .drive-card { background: linear-gradient(135deg,#F0F5FF,#E8F0FF); border-radius: 13px; padding: 12px; margin-bottom: 8px; }
    .drive-route { font-size: 14px; font-weight: 700; color: #1C2D50; }
    .drive-meta { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 5px; }
    .drive-meta span { font-size: 11px; color: #6080B0; }
    .tmp-item { background: #FFFBEE; border: 1.5px dashed #E8A000; border-radius: 12px; padding: 12px; margin-bottom: 8px; }
    .tmp-row { display: flex; justify-content: space-between; align-items: flex-start; }
    .tmp-name { font-size: 13px; font-weight: 600; color: #1C2D50; }
    .tmp-amt { font-size: 14px; font-weight: 700; color: #E80; }
    .tmp-sub { font-size: 11px; color: #A08040; margin-top: 2px; }
    .tmp-btns { display: flex; gap: 6px; margin-top: 9px; }
    .confirm-btn { background: linear-gradient(135deg,#2A8,#1A7); color: #fff; border: none; border-radius: 8px; padding: 6px 13px; font-size: 12px; font-weight: 700; cursor: pointer; }
    .del-btn { background: #FFF0F0; color: #D44; border: 1px solid #FFD0D0; border-radius: 8px; padding: 6px 10px; font-size: 12px; font-weight: 700; cursor: pointer; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: 700; }
    .badge-blue { background: #E8EEFF; color: #2547A1; }
    .badge-orange { background: #FFF3CC; color: #A06000; }
    .seg { display: flex; gap: 6px; margin-bottom: 12px; }
    .seg-btn { flex: 1; padding: 9px; border: none; border-radius: 10px; font-size: 12px; font-weight: 700; cursor: pointer; transition: all .2s; }
    .panel-info { background: #EEF3FF; border-radius: 14px; padding: 14px; margin: 16px 0; border: 1px solid #DDE8F8; }
    .panel-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 6px; }
    .panel-row:last-child { margin-bottom: 0; border-top: 1px solid #C5D5EE; padding-top: 8px; margin-top: 4px; font-size: 15px; }
    .cr-row { display: flex; align-items: center; gap: 8px; padding: 10px 0; border-bottom: 1px solid #EEF3FF; }
    .cr-row:last-child { border-bottom: none; }
    .empty { text-align: center; padding: 28px 0; color: #B0C4E8; }
    .empty .e-ico { font-size: 38px; margin-bottom: 8px; }
    .empty p { font-size: 13px; }
    .chart-wrap { position: relative; height: 180px; margin: 10px 0; }
    canvas { width: 100% !important; }
    .fc-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid #EEF3FF; }
    .fc-item:last-child { border-bottom: none; }
    .hist-item { background: #F5F9FF; border-radius: 12px; padding: 12px; margin-bottom: 8px; }
    .hist-hd { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .hist-month { font-size: 14px; font-weight: 700; color: #1C3561; }
    .hist-bal { font-size: 14px; font-weight: 700; }
    .hist-detail { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; font-size: 12px; color: #6080B0; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

const CATS = [
  {id:"food",      lbl:"食費",    em:"🍽️", bg:"#FFE8E8", col:"#D44"},
  {id:"daily",     lbl:"日用品",  em:"🧴", bg:"#FFF4E8", col:"#D84"},
  {id:"transport", lbl:"交通",    em:"🚃", bg:"#E8F4FF", col:"#28D"},
  {id:"car",       lbl:"車",      em:"🚗", bg:"#E8F0FF", col:"#46B"},
  {id:"fuel",      lbl:"燃料費",  em:"⛽", bg:"#FFF3CC", col:"#C80"},
  {id:"shop",      lbl:"買物",    em:"🛍️", bg:"#F4E8FF", col:"#84D"},
  {id:"ent",       lbl:"娯楽",    em:"🎮", bg:"#FFF0E8", col:"#E84"},
  {id:"health",    lbl:"医療",    em:"💊", bg:"#FFEEF4", col:"#E4A"},
  {id:"util",      lbl:"光熱費",  em:"💡", bg:"#FFFFF0", col:"#AA0"},
  {id:"house",     lbl:"住居",    em:"🏠", bg:"#F0EEE8", col:"#876"},
  {id:"edu",       lbl:"教育",    em:"📚", bg:"#E8FFF4", col:"#2A8"},
  {id:"beauty",    lbl:"美容",    em:"💄", bg:"#FFE8F0", col:"#E6A"},
  {id:"pet",       lbl:"ペット",  em:"🐾", bg:"#F0FFE8", col:"#6A4"},
  {id:"other",     lbl:"その他",  em:"📦", bg:"#EEF3FF", col:"#68A"},
];
const INC_CATS = [
  {id:"salary",    lbl:"給与",    em:"💰"},
  {id:"bonus",     lbl:"ボーナス",em:"🎁"},
  {id:"side",      lbl:"副業",    em:"💼"},
  {id:"invest",    lbl:"投資",    em:"📈"},
  {id:"other_inc", lbl:"その他",  em:"💵"},
];
const PURPOSES = ["通勤","買い物","観光","ドライブ","仕事","その他"];

const SK = {
  exp:"kb_exp_v4", inc:"kb_inc_v4", bud:"kb_bud_v4", fuel:"kb_fuel_v4",
  drive:"kb_drive_v4", fixed:"kb_fixed_v4", tmp:"kb_tmp_v4",
  irreg:"kb_irreg_v4", credit:"kb_credit_v4", history:"kb_history_v4",
};
const ld = (k,d) => { try { const r=localStorage.getItem(k); return r?JSON.parse(r):d; } catch{return d;} };
const sv = (k,v) => { try { localStorage.setItem(k,JSON.stringify(v)); } catch(e){console.error(e);} };

const yen = v => "¥"+(Math.round(Math.abs(v))||0).toLocaleString("ja-JP");
const today = () => new Date().toISOString().split("T")[0];
const curMonth = () => { const n=new Date(); return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,"0")}`; };
const fmtDate = d => { if(!d) return ""; const p=d.split("-"); return `${+p[1]}/${+p[2]}`; };
const fmtMonth = m => m ? m.replace("-","年")+"月" : "";
const cat  = id => CATS.find(c=>c.id===id)||CATS[CATS.length-1];
const icat = id => INC_CATS.find(c=>c.id===id)||INC_CATS[0];
const uid  = () => Date.now()+Math.random().toString(36).slice(2,6);

function DonutChart({data,colors,labels}){
  const ref=useRef(); const ch=useRef();
  useEffect(()=>{
    if(!ref.current||!data?.length) return;
    ch.current?.destroy();
    ch.current=new Chart(ref.current.getContext("2d"),{
      type:"doughnut",
      data:{labels,datasets:[{data,backgroundColor:colors,borderWidth:2,borderColor:"#fff"}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:"right",labels:{font:{size:9},boxWidth:10,padding:5}},tooltip:{callbacks:{label:c=>"¥"+c.raw.toLocaleString()}}},cutout:"60%"}
    });
    return ()=>ch.current?.destroy();
  },[data,colors,labels]);
  if(!data?.length) return null;
  return <canvas ref={ref}/>;
}
function LineChart({labels,datasets}){
  const ref=useRef(); const ch=useRef();
  useEffect(()=>{
    if(!ref.current) return;
    ch.current?.destroy();
    ch.current=new Chart(ref.current.getContext("2d"),{
      type:"line",data:{labels,datasets},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:{size:9},boxWidth:10}}},scales:{y:{beginAtZero:true,ticks:{font:{size:9},callback:v=>"¥"+v.toLocaleString()}},x:{ticks:{font:{size:9}}}}}
    });
    return ()=>ch.current?.destroy();
  },[labels,datasets]);
  return <canvas ref={ref}/>;
}

function Toast({msg,onDone}){
  useEffect(()=>{ const t=setTimeout(onDone,2200); return ()=>clearTimeout(t); },[]);
  return <div className="toast">{msg}</div>;
}

function HomeTab({exps,incs,bud,tmp,fixedCosts,onConfirmTmp,onDelTmp,month,onNav}){
  const mExp  = exps.filter(e=>e.date.startsWith(month));
  const mInc  = incs.filter(i=>i.date.startsWith(month));
  const fixedTotal = fixedCosts.filter(f=>f.active!==false).reduce((s,f)=>s+f.amount,0);
  const totalOut  = mExp.reduce((s,e)=>s+e.amount,0) + fixedTotal;
  const income    = mInc.reduce((s,i)=>s+i.amount,0);
  const balance   = income - totalOut;
  const budAmt    = bud[month]||0;
  const budPct    = budAmt>0 ? Math.min(totalOut/budAmt*100,100) : 0;
  const todayStr  = today();
  const todayExps = exps.filter(e=>e.date===todayStr);
  const todayTotal= todayExps.reduce((s,e)=>s+e.amount,0);
  const tmpTotal  = tmp.reduce((s,t)=>s+t.amount,0);
  const catMap={};
  mExp.forEach(e=>{ catMap[e.cat]=(catMap[e.cat]||0)+e.amount; });
  const catData=Object.entries(catMap).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const balColor = balance>=0?"#2A8":"#D44";
  return(
    <div className="page">
      <div className="card">
        <div className="card-hd">📊 {fmtMonth(month)}</div>
        <div className="sum-grid">
          <div className="sum-box"><div className="sum-lbl">支出合計</div><div className="sum-val c-red">{yen(totalOut)}</div></div>
          <div className="sum-box"><div className="sum-lbl">手取り</div><div className="sum-val c-green">{yen(income)}</div></div>
          <div className="sum-box" style={{gridColumn:"1/-1",background:balance>=0?"#F0FFF8":"#FFF5F5"}}>
            <div className="sum-lbl">収支</div>
            <div className="sum-val" style={{color:balColor}}>{balance>=0?"+":"-"}{yen(balance)}</div>
          </div>
        </div>
        {budAmt>0&&(
          <div className="bud-wrap">
            <div className="bud-row"><span>予算使用率</span><span>{yen(totalOut)} / {yen(budAmt)}</span></div>
            <div className="bar-bg"><div className="bar-fill" style={{width:`${budPct}%`,background:budPct>90?"#D44":budPct>70?"#E80":"#2547A1"}}/></div>
          </div>
        )}
      </div>
      <div className="card">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <div className="card-hd" style={{marginBottom:0}}>📅 今日の支出</div>
          <span className="sum-val c-red" style={{fontSize:16}}>{yen(todayTotal)}</span>
        </div>
        {todayExps.length===0
          ? <div style={{color:"#C0D4F0",fontSize:13,textAlign:"center",padding:"8px 0"}}>今日の記録はありません</div>
          : todayExps.slice(0,5).map(e=>{
              const c=cat(e.cat);
              return(
                <div key={e.id} className="lst-item">
                  <div className="lst-icon" style={{background:c.bg}}>{c.em}</div>
                  <div className="lst-main"><div className="lst-name">{e.memo||c.lbl}</div><div className="lst-sub">{c.lbl}</div></div>
                  <div className="lst-amt c-red">{yen(e.amount)}</div>
                </div>
              );
            })}
      </div>
      {tmp.length>0&&(
        <div className="card">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div className="card-hd" style={{marginBottom:0}}>⏳ 仮支出（未確定）</div>
            <span style={{fontSize:14,fontWeight:700,color:"#E80"}}>{yen(tmpTotal)}</span>
          </div>
          {tmp.map(t=>(
            <div key={t.id} className="tmp-item">
              <div className="tmp-row">
                <div><div className="tmp-name">{t.memo||cat(t.cat).lbl}</div><div className="tmp-sub">{fmtDate(t.date)} · {cat(t.cat).em} {cat(t.cat).lbl}</div></div>
                <div className="tmp-amt">{yen(t.amount)}</div>
              </div>
              <div className="tmp-btns">
                <button className="confirm-btn" onClick={()=>onConfirmTmp(t.id)}>✓ 確定</button>
                <button className="del-btn" onClick={()=>onDelTmp(t.id)}>✕ 削除</button>
              </div>
            </div>
          ))}
          <div style={{fontSize:11,color:"#A0B4D0",textAlign:"center",marginTop:6}}>仮支出は確定するまで月計に含まれません</div>
        </div>
      )}
      {catData.length>0&&(
        <div className="card">
          <div className="card-hd">📈 カテゴリ別</div>
          <div className="chart-wrap">
            <DonutChart data={catData.map(([,v])=>v)} colors={catData.map(([k])=>cat(k).col)} labels={catData.map(([k])=>cat(k).lbl)}/>
          </div>
        </div>
      )}
      <div className="card">
        <div className="card-hd">⚡ クイックアクション</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <button className="btn btn-primary btn-sm" style={{padding:"11px"}} onClick={()=>onNav("expense")}>＋ 支出追加</button>
          <button className="btn btn-secondary btn-sm" style={{padding:"11px"}} onClick={()=>onNav("income")}>＋ 収入追加</button>
        </div>
      </div>
    </div>
  );
}

function ExpenseTab({exps,onAdd,onDel,tmp,onAddTmp}){
  const [showForm,setShowForm]=useState(false);
  const [showTmpForm,setShowTmpForm]=useState(false);
  const [selCat,setSelCat]=useState("food");
  const [amt,setAmt]=useState(""); const [memo,setMemo]=useState(""); const [date,setDate]=useState(today());
  const [fm,setFm]=useState(curMonth());
  const [tCat,setTCat]=useState("food");
  const [tAmt,setTAmt]=useState(""); const [tMemo,setTMemo]=useState(""); const [tDate,setTDate]=useState(today());
  const filtered=exps.filter(e=>e.date.startsWith(fm)).sort((a,b)=>b.date.localeCompare(a.date));
  const mTotal=filtered.reduce((s,e)=>s+e.amount,0);
  const doAdd=()=>{ const a=parseInt(amt); if(!a||a<=0) return; onAdd({id:uid(),cat:selCat,amount:a,memo,date}); setAmt(""); setMemo(""); setDate(today()); setShowForm(false); };
  const doAddTmp=()=>{ const a=parseInt(tAmt); if(!a||a<=0) return; onAddTmp({id:uid(),cat:tCat,amount:a,memo:tMemo,date:tDate}); setTAmt(""); setTMemo(""); setTDate(today()); setShowTmpForm(false); };
  return(
    <div className="page">
      <div className="card">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div className="card-hd" style={{marginBottom:0}}>💸 支出管理</div>
          <div style={{display:"flex",gap:6}}>
            <button className="btn btn-secondary btn-xs" onClick={()=>setShowTmpForm(true)}>仮追加</button>
            <button className="btn btn-primary btn-xs" onClick={()=>setShowForm(true)}>＋ 追加</button>

            <div className="sum-box"><div className="sum-lbl">総ドライブ数</div><div className="sum-val c-orange">{drives.length}</div></div>
            <div className="sum-box"><div className="sum-lbl">総走行距離</div><div className="sum-val c-orange">{tDist.toFixed(0)}km</div></div>
          </div>
        </div>
        <div className="card">
          <div className="card-hd">📋 ドライブ履歴</div>
          {drives.length===0?<div className="empty"><div className="e-ico">🚗</div><p>ドライブ記録がありません</p></div>
            :[...drives].sort((a,b)=>b.date.localeCompare(a.date)).map(d=>(

                </div>
              </div>
            ))}

      </>)}

        <div className="fld"><label>日付</label><input type="date" className="inp" value={fDate} onChange={e=>setFDate(e.target.value)}/></div>
        <div className="row2">
          <div className="fld"><label>給油量（L）</label><input type="number" className="inp" placeholder="30.5" value={liters} onChange={e=>setLiters(e.target.value)} inputMode="decimal"/></div>
          <div className="fld"><label>単価（円/L）</label><input type="number" className="inp" placeholder="165" value={ppl} onChange={e=>setPpl(e.target.value)} inputMode="numeric"/></div>
        </div>
        <div className="fld"><label>オドメーター（km）※燃費計算用</label><input type="number" className="inp" placeholder="12345" value={odo} onChange={e=>setOdo(e.target.value)} inputMode="numeric"/></div>
        {liters&&ppl&&(<div style={{background:"#F0FFF8",border:"1px solid #C0EED8",borderRadius:10,padding:10,marginBottom:12,fontSize:13}}>💰 給油費用: <strong>{yen(parseFloat(liters)*parseFloat(ppl))}</strong></div>)}
        <div className="fld"><label>メモ（任意）</label><input type="text" className="inp" placeholder="給油場所など" value={fMemo} onChange={e=>setFMemo(e.target.value)}/></div>
        <button className="btn btn-primary btn-full" onClick={doAddFuel}>記録する</button>
      </div></div>)}
      {showDF&&(<div className="overlay" onClick={()=>setShowDF(false)}><div className="sheet" onClick={e=>e.stopPropagation()}>
        <div className="sheet-hdl"/><div className="sheet-ttl">🚗 ドライブを記録</div>
        <div className="fld"><label>日付</label><input type="date" className="inp" value={dDate} onChange={e=>setDDate(e.target.value)}/></div>
        <div className="row2">
          <div className="fld"><label>出発地</label><input type="text" className="inp" placeholder="自宅" value={from} onChange={e=>setFrom(e.target.value)}/></div>
          <div className="fld"><label>目的地</label><input type="text" className="inp" placeholder="スーパー" value={to} onChange={e=>setTo(e.target.value)}/></div>
        </div>
        <div className="row2">
          <div className="fld"><label>距離（km）</label><input type="number" className="inp" placeholder="15.5" value={dist} onChange={e=>setDist(e.target.value)} inputMode="decimal"/></div>
          <div className="fld"><label>目的</label><select className="inp" value={purp} onChange={e=>setPurp(e.target.value)}>{PURPOSES.map(p=><option key={p} value={p}>{p}</option>)}</select></div>
        </div>
        <div className="fld"><label>メモ（任意）</label><input type="text" className="inp" placeholder="特記事項" value={dMemo} onChange={e=>setDMemo(e.target.value)}/></div>
        <button className="btn btn-primary btn-full" onClick={doAddDrive}>記録する</button>
      </div></div>)}

  );
}

function AnalysisTab({exps,incs,fuels,fixed}){
  const [view,setView]=useState("monthly");
  const monthMap={};
  exps.forEach(e=>{ const m=e.date.slice(0,7); if(!monthMap[m]) monthMap[m]={exp:0,inc:0}; monthMap[m].exp+=e.amount; });
  incs.forEach(i=>{ const m=i.date.slice(0,7); if(!monthMap[m]) monthMap[m]={exp:0,inc:0}; monthMap[m].inc+=i.amount; });
  const months=Object.keys(monthMap).sort().slice(-6);
  const fixedTotal=fixed.filter(f=>f.active!==false).reduce((s,f)=>s+f.amount,0);
  const catMap={};
  exps.forEach(e=>{ catMap[e.cat]=(catMap[e.cat]||0)+e.amount; });
  const catEntries=Object.entries(catMap).sort((a,b)=>b[1]-a[1]);
  const allExp=exps.reduce((s,e)=>s+e.amount,0);
  const srtFuel=[...fuels].sort((a,b)=>a.date.localeCompare(b.date));
  const fuelTrend=[];
  srtFuel.forEach((l,i)=>{ if(i>0&&l.odo&&srtFuel[i-1].odo){ const d=l.odo-srtFuel[i-1].odo; if(d>0) fuelTrend.push({date:l.date,eff:d/l.liters}); } });
  return(
    <div className="page">
      <div className="seg">
        {["monthly","category","fuel"].map(v=>(
          <button key={v} className={`seg-btn ${view===v?"btn btn-primary":"btn btn-secondary"}`} onClick={()=>setView(v)}>
            {v==="monthly"?"月別":v==="category"?"カテゴリ":"燃費"}
          </button>
        ))}
      </div>
      {view==="monthly"&&(<div className="card">
        <div className="card-hd">📅 月別推移（直近6ヶ月）</div>
        {months.length===0?<div className="empty"><div className="e-ico">📊</div><p>データがありません</p></div>:<>
          <div className="chart-wrap">
            <LineChart labels={months.map(m=>m.replace("-","/"))} datasets={[
              {label:"支出",data:months.map(m=>(monthMap[m]?.exp||0)+fixedTotal),borderColor:"#D44",backgroundColor:"rgba(221,68,68,.1)",tension:.4,fill:true},
              {label:"収入",data:months.map(m=>monthMap[m]?.inc||0),borderColor:"#2A8",backgroundColor:"rgba(34,170,136,.1)",tension:.4,fill:true},
            ]}/>
          </div>
          {months.map(m=>(
            <div key={m} className="lst-item">
              <div className="lst-main"><div className="lst-name">{fmtMonth(m)}</div></div>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:12,color:"#D44",fontWeight:600}}>-{yen((monthMap[m]?.exp||0)+fixedTotal)}</div>
                <div style={{fontSize:12,color:"#2A8",fontWeight:600}}>+{yen(monthMap[m]?.inc||0)}</div>
              </div>
            </div>
          ))}
        </>}
      </div>)}
      {view==="category"&&(<div className="card">
        <div className="card-hd">🏷️ カテゴリ別支出（全期間）</div>
        {catEntries.length===0?<div className="empty"><div className="e-ico">📊</div><p>データがありません</p></div>:<>
          <div className="chart-wrap">
            <DonutChart data={catEntries.map(([,v])=>v)} colors={catEntries.map(([k])=>cat(k).col)} labels={catEntries.map(([k])=>cat(k).lbl)}/>
          </div>
          {catEntries.map(([id,amt])=>{ const c=cat(id); const pct=allExp>0?amt/allExp*100:0; return(
            <div key={id} style={{marginBottom:9}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                <span style={{fontSize:12}}>{c.em} {c.lbl}</span>
                <span style={{fontSize:12,fontWeight:600}}>{yen(amt)} ({pct.toFixed(1)}%)</span>
              </div>
              <div className="bar-bg"><div className="bar-fill" style={{width:`${pct}%`,background:c.col}}/></div>
            </div>
          );})}
        </>}
      </div>)}
      {view==="fuel"&&(<div className="card">
        <div className="card-hd">⛽ 燃費トレンド</div>
        {fuelTrend.length<2?<div className="empty"><div className="e-ico">⛽</div><p>オドメーター付きの給油記録が<br/>2件以上必要です</p></div>:<>
          <div className="chart-wrap">
            <LineChart labels={fuelTrend.map(f=>fmtDate(f.date))} datasets={[{label:"燃費 km/L",data:fuelTrend.map(f=>+f.eff.toFixed(2)),borderColor:"#E80",backgroundColor:"rgba(238,136,0,.1)",tension:.4,fill:true}]}/>
          </div>
          {fuelTrend.map((f,i)=>(
            <div key={i} className="lst-item">
              <div className="lst-main"><div className="lst-name">{fmtDate(f.date)}</div></div>
              <div className="stat-val" style={{fontSize:15}}>{f.eff.toFixed(1)} km/L</div>
            </div>
          ))}
        </>}
      </div>)}
    </div>
  );
}

function HistoryTab({history}){
  return(
    <div className="page">
      <div className="card">
        <div className="card-hd">📖 月次履歴</div>
        <div style={{fontSize:12,color:"#8AAAD0",marginBottom:12}}>締めた月の記録です</div>
        {history.length===0?<div className="empty"><div className="e-ico">📖</div><p>まだ月を締めていません</p></div>
          :[...history].sort((a,b)=>b.month.localeCompare(a.month)).map(h=>{
            const bal=h.income-(h.expTotal+h.fixedTotal);

              <div key={h.month} className="hist-item">
                <div className="hist-hd">
                  <div className="hist-month">{fmtMonth(h.month)}</div>
                  <div className="hist-bal" style={{color:bal>=0?"#2A8":"#D44"}}>{bal>=0?"+":"-"}{yen(bal)}</div>
                </div>
                <div className="hist-detail">
                  <span>手取り: {yen(h.income)}</span>
                  <span>変動支出: {yen(h.expTotal)}</span>

                  <span>支出合計: {yen(h.expTotal+h.fixedTotal)}</span>

function SettingsTab({bud,onSetBud,exps,incs,fuels,drives,onShowClose,onShowData}){
  const [month]=useState(curMonth());
  const [budInput,setBudInput]=useState(bud[month]?String(bud[month]):"");
  const totalExp=exps.reduce((s,e)=>s+e.amount,0);
  const totalInc=incs.reduce((s,i)=>s+i.amount,0);
  const doSetBud=()=>{ const a=parseInt(budInput); if(!a||a<=0) return; onSetBud(month,a); };
  return(
    <div className="page">
      <div className="card">
        <div className="card-hd">🎯 月間予算設定</div>
        <div style={{fontSize:12,color:"#8AAAD0",marginBottom:10}}>{fmtMonth(month)}の予算</div>
        <div className="row2">
          <div className="fld"><input type="number" className="inp" placeholder="例: 200000" value={budInput} onChange={e=>setBudInput(e.target.value)} inputMode="numeric"/></div>
          <div className="fld"><button className="btn btn-primary btn-full" style={{height:"100%"}} onClick={doSetBud}>設定</button></div>
        </div>
        {bud[month]&&<div style={{fontSize:13,color:"#2A8",marginTop:4}}>✓ 現在の予算: {yen(bud[month])}</div>}
      </div>
      <div className="card">
        <div className="card-hd">📊 全期間統計</div>
        <div className="sum-grid">
          <div className="sum-box"><div className="sum-lbl">総記録数</div><div className="sum-val">{exps.length+incs.length}</div></div>
          <div className="sum-box"><div className="sum-lbl">車両記録数</div><div className="sum-val c-orange">{fuels.length+drives.length}</div></div>
          <div className="sum-box"><div className="sum-lbl">総支出</div><div className="sum-val c-red">{yen(totalExp)}</div></div>
          <div className="sum-box"><div className="sum-lbl">総収入</div><div className="sum-val c-green">{yen(totalInc)}</div></div>
        </div>
      </div>
      <div className="card">
        <div className="card-hd">📅 月次操作</div>
        <button className="btn btn-primary btn-full" style={{marginBottom:10}} onClick={onShowClose}>今月を締める</button>
      </div>
      <div className="card">
        <div className="card-hd">💾 データ管理</div>
        <button className="btn btn-secondary btn-full" onClick={onShowData}>📤 書き出し / 📥 読み込み</button>
      </div>
      <div className="card">
        <div className="card-hd">ℹ️ アプリについて</div>
        <div style={{fontSize:13,color:"#6080B0",lineHeight:1.8}}>
          <div>家計簿・燃費管理 v4.0</div>
          <div>· 支出・収入・固定費・不定期費</div>
          <div>· 仮支出（未確定費用）管理</div>
          <div>· クレカ記録（別管理）</div>
          <div>· 給油・ドライブ記録 / 燃費計算</div>
          <div>· 月次締め・履歴管理</div>
          <div>· データ書き出し／読み込み</div>
          <div>· オフライン対応（localStorage）</div>
        </div>
      </div>
    </div>
  );
}

function App(){
  const [tab,setTab]=useState("home");
  const [toast,setToast]=useState(null);
  const [month]=useState(curMonth());
  const [showClose,setShowClose]=useState(false);
  const [closeNote,setCloseNote]=useState("");
  const [showData,setShowData]=useState(false);
  const importRef=useRef();

  const [exps,   setExps  ]=useState(()=>ld(SK.exp,[]));
  const [incs,   setIncs  ]=useState(()=>ld(SK.inc,[]));
  const [bud,    setBud   ]=useState(()=>ld(SK.bud,{}));
  const [fuels,  setFuels ]=useState(()=>ld(SK.fuel,[]));
  const [drives, setDrives]=useState(()=>ld(SK.drive,[]));
  const [fixed,  setFixed ]=useState(()=>ld(SK.fixed,[]));
  const [tmp,    setTmp   ]=useState(()=>ld(SK.tmp,[]));
  const [irreg,  setIrreg ]=useState(()=>ld(SK.irreg,[]));
  const [credits,setCredits]=useState(()=>ld(SK.credit,[]));
  const [history,setHistory]=useState(()=>ld(SK.history,[]));

  useEffect(()=>{ sv(SK.exp,exps); },[exps]);
  useEffect(()=>{ sv(SK.inc,incs); },[incs]);
  useEffect(()=>{ sv(SK.bud,bud); },[bud]);
  useEffect(()=>{ sv(SK.fuel,fuels); },[fuels]);
  useEffect(()=>{ sv(SK.drive,drives); },[drives]);
  useEffect(()=>{ sv(SK.fixed,fixed); },[fixed]);
  useEffect(()=>{ sv(SK.tmp,tmp); },[tmp]);
  useEffect(()=>{ sv(SK.irreg,irreg); },[irreg]);
  useEffect(()=>{ sv(SK.credit,credits); },[credits]);
  useEffect(()=>{ sv(SK.history,history); },[history]);

  const notif=msg=>{setToast(msg); setTimeout(()=>setToast(null),2200);};

  const addExp=e=>{setExps(p=>[e,...p]); notif("支出を追加しました");};
  const delExp=id=>{setExps(p=>p.filter(e=>e.id!==id)); notif("削除しました");};
  const addTmp=t=>{setTmp(p=>[t,...p]); notif("仮支出を追加しました");};
  const confirmTmp=id=>{ const t=tmp.find(t=>t.id===id); if(t){setExps(p=>[{...t,id:uid()},...p]); setTmp(p=>p.filter(t=>t.id!==id)); notif("支出として確定しました");} };
  const delTmp=id=>{setTmp(p=>p.filter(t=>t.id!==id)); notif("削除しました");};
  const addInc=i=>{setIncs(p=>[i,...p]); notif("収入を追加しました");};
  const delInc=id=>{setIncs(p=>p.filter(i=>i.id!==id)); notif("削除しました");};
  const addFixed=f=>{setFixed(p=>[f,...p]); notif("固定支出を追加しました");};
  const delFixed=id=>{setFixed(p=>p.filter(f=>f.id!==id)); notif("削除しました");};
  const toggleFixed=id=>{setFixed(p=>p.map(f=>f.id===id?{...f,active:f.active===false}:f)); notif("更新しました");};
  const addIrreg=f=>{setIrreg(p=>[f,...p]); notif("不定期支出を登録しました");};
  const delIrreg=id=>{setIrreg(p=>p.filter(f=>f.id!==id)); notif("削除しました");};
  const addCredit=c=>{setCredits(p=>[c,...p]); notif("クレカ記録を追加しました");};
  const delCredit=id=>{setCredits(p=>p.filter(c=>c.id!==id)); notif("削除しました");};
  const addFuel=l=>{setFuels(p=>[l,...p]); notif("給油を記録しました");};
  const delFuel=id=>{setFuels(p=>p.filter(l=>l.id!==id)); notif("削除しました");};
  const addDrive=d=>{setDrives(p=>[d,...p]); notif("ドライブを記録しました");};
  const delDrive=id=>{setDrives(p=>p.filter(d=>d.id!==id)); notif("削除しました");};
  const setBudForMonth=(m,a)=>{setBud(p=>({...p,[m]:a})); notif("予算を設定しました");};

  const mIncs=incs.filter(i=>i.date.startsWith(month));
  const mExps=exps.filter(e=>e.date.startsWith(month));
  const income=mIncs.reduce((s,i)=>s+i.amount,0);
  const expTotal=mExps.reduce((s,e)=>s+e.amount,0);
  const fixedTotal=fixed.filter(f=>f.active!==false).reduce((s,f)=>s+f.amount,0);
  const totalOut=expTotal+fixedTotal;
  const balance=income-totalOut;
  const balColor=balance>=0?"#2A8":"#D44";
  const creditExpTotal=credits.filter(c=>c.date.startsWith(month)).reduce((s,c)=>s+c.amount,0);

  const closeMonth=()=>{
    setHistory(p=>[{month,income,expTotal,fixedTotal,note:closeNote},...p.filter(h=>h.month!==month)]);
    notif("月を締めました"); setShowClose(false); setCloseNote("");
  };

  const exportData=()=>{
    const d={exps,incs,bud,fuels,drives,fixed,tmp,irreg,credits,history,exportDate:new Date().toISOString()};
    const b=new Blob([JSON.stringify(d,null,2)],{type:"application/json"});
    const u=URL.createObjectURL(b);
    const a=document.createElement("a"); a.href=u; a.download=`kakeibo_${today()}.json`; a.click();
    URL.revokeObjectURL(u);
  };
  const importData=e=>{
    const f=e.target.files[0]; if(!f) return;
    const r=new FileReader();
    r.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(d.exps) setExps(d.exps); if(d.incs) setIncs(d.incs); if(d.bud) setBud(d.bud);
        if(d.fuels) setFuels(d.fuels); if(d.drives) setDrives(d.drives); if(d.fixed) setFixed(d.fixed);
        if(d.tmp) setTmp(d.tmp); if(d.irreg) setIrreg(d.irreg); if(d.credits) setCredits(d.credits);
        if(d.history) setHistory(d.history);
        notif("データを読み込みました");
      } catch{ notif("読み込みエラー"); }
    };
    r.readAsText(f); e.target.value="";
  };

  const TABS=[
    {id:"home",    lbl:"ホーム",  em:"🏠"},
    {id:"expense", lbl:"支出",    em:"💸"},
    {id:"income",  lbl:"収入",    em:"💰"},
    {id:"fixed",   lbl:"固定費",  em:"📌"},
    {id:"irreg",   lbl:"不定期",  em:"🗂️"},
    {id:"credit",  lbl:"クレカ",  em:"💳"},
    {id:"fuel",    lbl:"車両",    em:"🚗"},
    {id:"analysis",lbl:"分析",    em:"📊"},
    {id:"history", lbl:"履歴",    em:"📖"},
    {id:"settings",lbl:"設定",    em:"⚙️"},
  ];

  return(
    <div className="shell">
      <div className="hdr">
        <div className="hdr-inner">
          <div className="hdr-top">
            <div><div className="hdr-title">家計簿</div><div className="hdr-sub">{fmtMonth(month)} · スマート家計管理</div></div>
            <div className="hdr-actions"><button className="hdr-btn" onClick={()=>setTab("settings")}>⚙️</button></div>
          </div>
        </div>
        <div className="tabs">
          {TABS.map(t=>(<button key={t.id} className={`tab${tab===t.id?" on":""}`} onClick={()=>setTab(t.id)}><span>{t.em}</span><span>{t.lbl}</span></button>))}
        </div>
      </div>

      {tab==="home"&&<HomeTab exps={exps} incs={incs} bud={bud} tmp={tmp} fixedCosts={fixed} onConfirmTmp={confirmTmp} onDelTmp={delTmp} month={month} onNav={setTab}/>}
      {tab==="expense"&&<ExpenseTab exps={exps} onAdd={addExp} onDel={delExp} tmp={tmp} onAddTmp={addTmp}/>}
      {tab==="income"&&<IncomeTab incs={incs} onAdd={addInc} onDel={delInc}/>}
      {tab==="fixed"&&<FixedTab fixed={fixed} onAdd={addFixed} onDel={delFixed} onToggle={toggleFixed}/>}
      {tab==="irreg"&&<IrregTab irreg={irreg} onAdd={addIrreg} onDel={delIrreg} exps={exps} onAddExp={addExp}/>}
      {tab==="credit"&&<CreditTab credits={credits} onAdd={addCredit} onDel={delCredit}/>}
      {tab==="fuel"&&<FuelTab fuels={fuels} drives={drives} onAddFuel={addFuel} onDelFuel={delFuel} onAddDrive={addDrive} onDelDrive={delDrive}/>}
      {tab==="analysis"&&<AnalysisTab exps={exps} incs={incs} fuels={fuels} fixed={fixed}/>}
      {tab==="history"&&<HistoryTab history={history}/>}
      {tab==="settings"&&<SettingsTab bud={bud} onSetBud={setBudForMonth} exps={exps} incs={incs} fuels={fuels} drives={drives} onShowClose={()=>setShowClose(true)} onShowData={()=>setShowData(true)}/>}

      {toast&&<Toast msg={toast} onDone={()=>setToast(null)}/>}

      {showClose&&(
        <div style={{ position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:400,display:"flex",alignItems:"center",justifyContent:"center" }}>
          <div style={{ background:"#fff",borderRadius:20,padding:"28px 24px",maxWidth:320,width:"90%",boxShadow:"0 8px 32px rgba(30,60,180,0.18)" }}>
            <div style={{ fontSize:16,fontWeight:700,marginBottom:6 }}>今月を締めますか？</div>
            <div className="panel-info">
              <div className="panel-row"><span style={{ color:"#5070A0" }}>手取り</span><span style={{ fontWeight:600 }}>{yen(income)}</span></div>
              <div className="panel-row"><span style={{ color:"#5070A0" }}>支出合計</span><span style={{ fontWeight:600 }}>{yen(totalOut)}</span></div>
              {creditExpTotal>0&&<div className="panel-row" style={{ fontSize:12,color:"#4060A0" }}><span>CR利用（別）</span><span>{yen(creditExpTotal)}</span></div>}
              <div className="panel-row"><span style={{ color:"#5070A0" }}>残り</span><span style={{ fontWeight:700,color:balColor }}>{yen(balance)}</span></div>
            </div>
            <div style={{ display:"flex",gap:10 }}>
              <button onClick={()=>setShowClose(false)} style={{ flex:1,padding:"12px",background:"#EEF2FF",border:"none",borderRadius:10,fontSize:14,cursor:"pointer",color:"#4060A0" }}>やめる</button>
              <button onClick={closeMonth} style={{ flex:2,padding:"12px",background:"#1C3561",border:"none",borderRadius:10,fontSize:14,cursor:"pointer",color:"#fff",fontWeight:700 }}>締める</button>
            </div>
          </div>
        </div>
      )}

      {showData&&(
        <div style={{ position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:300,display:"flex",alignItems:"flex-end" }} onClick={e=>e.target===e.currentTarget&&setShowData(false)}>
          <div style={{ background:"#F5F9FF",borderRadius:"20px 20px 0 0",padding:"28px 20px 40px",width:"100%",maxWidth:480,margin:"0 auto" }}>
            <div style={{ fontSize:15,fontWeight:700,marginBottom:6 }}>データ管理</div>
            <div style={{ fontSize:12,color:"#88A8CC",marginBottom:20 }}>全データ（固定支出・履歴・当月・不定期マスター）を対象とします</div>
            <div style={{ display:"flex",flexDirection:"column",gap:10 }}>
              <button onClick={exportData} style={{ padding:"15px",background:"#1C3561",border:"none",borderRadius:14,color:"#BCD8FF",fontSize:14,cursor:"pointer",fontWeight:600,textAlign:"left" }}>
                <span style={{ fontSize:18,marginRight:10 }}>📤</span>書き出し（JSONダウンロード）
              </button>
              <button onClick={()=>importRef.current.click()} style={{ padding:"15px",background:"#EEF4FF",border:"2px solid #B0C4F0",borderRadius:14,color:"#1C3561",fontSize:14,cursor:"pointer",fontWeight:600,textAlign:"left" }}>
                <span style={{ fontSize:18,marginRight:10 }}>📥</span>読み込み（JSONを選択）
              </button>
              <input ref={importRef} type="file" accept=".json" onChange={importData} style={{ display:"none" }} />
            </div>
            <button onClick={()=>setShowData(false)} style={{ marginTop:16,width:"100%",padding:"13px",background:"#E0E8F8",border:"none",borderRadius:12,fontSize:14,cursor:"pointer",color:"#4060A0" }}>閉じる</button>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
